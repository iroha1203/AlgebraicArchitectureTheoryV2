      fi
    fi
  fi

  return 1
}

if [ ! -d ".lake" ] && WARM="$(resolve_warm_lake)"; then
  echo "APFS clone-copying warm .lake cache from $WARM"
  /bin/cp -cR "$WARM" ".lake"
fi
