<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArchSig Atom Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090d;
      --surface: #10151d;
      --surface-2: #17202d;
      --line: #334155;
      --line-hot: rgba(100, 214, 190, 0.42);
      --glass: rgba(7, 10, 15, 0.66);
      --glass-strong: rgba(10, 15, 24, 0.9);
      --text: #f3f7fb;
      --muted: #a7b7c8;
      --accent: #64d6be;
      --accent-2: #f2c15f;
      --danger: #ff6b74;
      --blue: #73b7ff;
      --violet: #c49cff;
      --ember: #ff9468;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    button,
    input {
      font: inherit;
    }

    select {
      min-height: 32px;
      max-width: 190px;
      padding: 0 8px;
      border: 1px solid rgba(138, 160, 184, 0.28);
      border-radius: 6px;
      background: rgba(13, 19, 29, 0.88);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .app {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .app::before {
      position: absolute;
      inset: 0;
      z-index: 3;
      content: "";
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.018) 0,
          rgba(255, 255, 255, 0.018) 1px,
          transparent 1px,
          transparent 9px
        );
      mix-blend-mode: screen;
      opacity: 0.32;
      pointer-events: none;
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(180deg, rgba(7, 9, 13, 0.18), rgba(7, 9, 13, 0.54)),
        #090d13;
    }

    .viewer::before,
    .viewer::after {
      position: absolute;
      inset: 0;
      z-index: 2;
      content: "";
      pointer-events: none;
    }

    .viewer::before {
      opacity: 0.42;
      background:
        linear-gradient(rgba(115, 183, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 214, 190, 0.08) 1px, transparent 1px),
        linear-gradient(135deg, transparent 0 48%, rgba(242, 193, 95, 0.08) 49%, transparent 50% 100%);
      background-size: 72px 72px, 72px 72px, 360px 360px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.78), transparent 70%);
    }

    .viewer::after {
      background:
        linear-gradient(90deg, rgba(7, 9, 13, 0.52), transparent 18%, transparent 82%, rgba(7, 9, 13, 0.52)),
        linear-gradient(180deg, rgba(7, 9, 13, 0.2), transparent 34%, rgba(7, 9, 13, 0.56));
    }

    #scene {
      position: absolute;
      inset: 0;
    }

    #scene canvas {
      filter: saturate(1.08) contrast(1.05);
    }

    .toolbar {
      position: absolute;
      z-index: 5;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
      justify-content: space-between;
      pointer-events: none;
    }

    .toolbar-group {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
      padding: 6px;
      border: 1px solid rgba(167, 183, 200, 0.18);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.012)),
        var(--glass);
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      pointer-events: auto;
      backdrop-filter: blur(18px) saturate(1.2);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
      position: relative;
    }

    .toolbar-group::before {
      position: absolute;
      top: 0;
      left: 14px;
      right: 14px;
      height: 1px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(100, 214, 190, 0.58), transparent);
      pointer-events: none;
    }

    .toolbar-group.primary {
      max-width: min(160px, calc(100vw - 24px));
    }

    .toolbar-group.layers {
      margin-left: auto;
    }

    .toolbar-group.filters {
      flex-basis: auto;
      width: max-content;
      max-width: calc(100vw - 24px);
      flex-wrap: wrap;
      justify-content: flex-end;
      margin-left: auto;
    }

    .toolbar-label {
      align-self: center;
      padding: 0 4px;
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .title {
      max-width: 38vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0 8px;
      color: #c7d4e2;
      font-size: 13px;
    }

    .app:not(.data-loaded) .toolbar-group,
    .app:not(.data-loaded) .legend,
    .app:not(.data-loaded) .axis-hud,
    .app:not(.data-loaded) .status,
    .app:not(.data-loaded) .report-toggle {
      display: none;
    }

    .launch-panel {
      position: absolute;
      z-index: 6;
      left: 50%;
      top: 50%;
      display: grid;
      gap: 10px;
      justify-items: center;
      width: min(360px, calc(100vw - 32px));
      padding: 18px;
      border: 1px solid rgba(100, 214, 190, 0.28);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(100, 214, 190, 0.12), transparent 120px),
        var(--glass-strong);
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.54),
        0 0 40px rgba(100, 214, 190, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transform: translate(-50%, -50%);
      pointer-events: auto;
      backdrop-filter: blur(20px) saturate(1.2);
      clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
    }

    .launch-panel::before {
      position: absolute;
      top: 0;
      left: 24px;
      right: 24px;
      height: 1px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(100, 214, 190, 0.68), transparent);
      pointer-events: none;
    }

    .launch-title {
      color: #dce7f3;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .launch-panel .file-button {
      min-height: 44px;
      min-width: 148px;
      border-color: rgba(242, 193, 95, 0.38);
      background:
        linear-gradient(180deg, rgba(242, 193, 95, 0.2), rgba(255, 255, 255, 0.02)),
        rgba(18, 24, 34, 0.94);
      box-shadow:
        0 0 34px rgba(242, 193, 95, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      font-weight: 800;
    }

    .app.data-loaded .launch-panel {
      display: none;
    }

    .button,
    .file-button {
      display: inline-grid;
      place-items: center;
      min-height: 32px;
      min-width: 32px;
      padding: 0 10px;
      border: 1px solid rgba(138, 160, 184, 0.3);
      border-radius: 6px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(19, 27, 40, 0.92);
      color: var(--text);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      clip-path: polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px);
      font-weight: 700;
    }

    .file-button input {
      display: none;
    }

    .button:hover,
    .file-button:hover,
    .toggle:hover {
      border-color: var(--accent);
      box-shadow:
        0 0 0 1px rgba(100, 214, 190, 0.08),
        0 0 22px rgba(100, 214, 190, 0.16);
    }

    .toggle {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-height: 32px;
      padding: 0 8px;
      border: 1px solid rgba(138, 160, 184, 0.26);
      border-radius: 6px;
      background: rgba(11, 18, 28, 0.76);
      color: #c6d2df;
      font-size: 12px;
      cursor: pointer;
      clip-path: polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px);
    }

    .toggle input {
      accent-color: var(--accent);
    }

    .search {
      min-height: 32px;
      width: min(260px, 24vw);
      padding: 0 10px;
      border: 1px solid rgba(138, 160, 184, 0.28);
      border-radius: 6px;
      background: rgba(11, 18, 28, 0.82);
      color: var(--text);
      font-size: 12px;
      outline: none;
      clip-path: polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px);
    }

    select:focus,
    .search:focus {
      border-color: rgba(100, 214, 190, 0.72);
      box-shadow: 0 0 0 2px rgba(100, 214, 190, 0.12);
    }

    .search::placeholder {
      color: var(--muted);
    }

    .status {
      position: absolute;
      z-index: 5;
      left: 12px;
      bottom: 12px;
      max-width: min(680px, calc(100vw - 24px));
      padding: 8px 10px;
      border: 1px solid rgba(100, 214, 190, 0.22);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(100, 214, 190, 0.14), transparent 18%),
        var(--glass);
      color: #cbd7e4;
      font-size: 12px;
      pointer-events: none;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
    }

    .detail {
      position: absolute;
      z-index: 9;
      right: 12px;
      top: 188px;
      bottom: auto;
      width: min(420px, calc(100vw - 24px));
      max-height: min(46vh, 420px);
      overflow: auto;
      padding: 12px;
      border: 1px solid rgba(115, 183, 255, 0.26);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(115, 183, 255, 0.12), transparent 90px),
        var(--glass-strong);
      box-shadow:
        0 20px 58px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(18px);
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    }

    .detail h2 {
      margin: 0 0 8px;
      font-size: 13px;
      line-height: 1.3;
    }

    .detail p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .detail[hidden] {
      display: none;
    }

    .legend {
      position: absolute;
      z-index: 5;
      left: 12px;
      bottom: 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      max-width: min(760px, calc(100vw - 460px));
      padding: 8px;
      border: 1px solid rgba(167, 183, 200, 0.16);
      border-radius: var(--radius);
      background: rgba(7, 10, 15, 0.62);
      pointer-events: none;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
    }

    .legend-item {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: #cbd7e4;
      font-size: 11px;
    }

    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }

    .axis-hud {
      position: absolute;
      z-index: 5;
      top: auto;
      right: 12px;
      bottom: 62px;
      width: min(300px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid rgba(100, 214, 190, 0.24);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(100, 214, 190, 0.1), transparent 72px),
        var(--glass);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      pointer-events: none;
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.36),
        inset 3px 0 0 rgba(100, 214, 190, 0.48);
      backdrop-filter: blur(18px);
      clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    }

    .axis-hud strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.03em;
    }

    .axis-hud div {
      display: grid;
      grid-template-columns: 20px minmax(0, 1fr);
      gap: 6px;
    }

    .axis-hud b {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(100, 214, 190, 0.34);
    }

    .drop {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: none;
      place-items: center;
      border: 2px solid var(--accent);
      background: rgba(76, 195, 167, 0.12);
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
    }

    .drop.active {
      display: grid;
    }

    .report-toggle {
      position: absolute;
      z-index: 8;
      right: 12px;
      bottom: 12px;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(242, 193, 95, 0.34);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(242, 193, 95, 0.18), rgba(255, 255, 255, 0.02)),
        rgba(18, 24, 34, 0.92);
      color: var(--text);
      cursor: pointer;
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.38),
        0 0 28px rgba(242, 193, 95, 0.16);
      backdrop-filter: blur(18px);
      clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
      font-weight: 700;
    }

    .report-toggle:hover {
      border-color: var(--accent-2);
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.38),
        0 0 36px rgba(242, 193, 95, 0.24);
    }

    .app.report-open .report-toggle {
      bottom: min(58vh, 620px);
      transform: translateY(-12px);
    }

    .app.report-open .axis-hud {
      bottom: calc(min(58vh, 620px) + 62px);
    }

    .report {
      position: absolute;
      z-index: 7;
      left: 12px;
      right: 12px;
      bottom: 12px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 1px;
      min-height: 0;
      height: min(58vh, 620px);
      overflow: hidden;
      border: 1px solid rgba(115, 183, 255, 0.22);
      border-radius: var(--radius);
      background: rgba(115, 183, 255, 0.16);
      box-shadow:
        0 28px 96px rgba(0, 0, 0, 0.56),
        0 0 0 1px rgba(100, 214, 190, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transform: translateY(calc(100% + 24px));
      visibility: hidden;
      pointer-events: none;
      transition: transform 180ms ease, visibility 0ms linear 180ms;
      backdrop-filter: blur(18px);
      clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
    }

    .app.report-open .report {
      transform: translateY(0);
      visibility: visible;
      pointer-events: auto;
      transition: transform 180ms ease;
    }

    .panel {
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(115, 183, 255, 0.08), transparent 140px),
        rgba(9, 14, 22, 0.96);
      padding: 18px;
      position: relative;
    }

    .panel::before {
      position: absolute;
      top: 0;
      left: 18px;
      right: 18px;
      height: 1px;
      content: "";
      background: linear-gradient(90deg, transparent, rgba(115, 183, 255, 0.42), transparent);
      pointer-events: none;
    }

    .panel h1,
    .panel h2 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .panel h1 {
      color: #f7fbff;
      text-shadow: 0 0 22px rgba(115, 183, 255, 0.18);
    }

    .panel h2 {
      color: #dce7f3;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .metric {
      min-height: 68px;
      padding: 10px;
      border: 1px solid rgba(138, 160, 184, 0.22);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.012)),
        rgba(12, 18, 28, 0.9);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        inset 0 -1px 0 rgba(100, 214, 190, 0.08);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .metric .label {
      color: #9fb3c8;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .metric .value {
      margin-top: 6px;
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.18;
      overflow-wrap: anywhere;
      color: #f7fbff;
    }

    .metric .value span {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .section {
      margin-top: 16px;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      padding: 10px;
      border: 1px solid rgba(138, 160, 184, 0.18);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(115, 183, 255, 0.06), transparent 42%),
        rgba(12, 18, 28, 0.82);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      clip-path: polygon(9px 0, 100% 0, 100% calc(100% - 9px), calc(100% - 9px) 100%, 0 100%, 0 9px);
    }

    .item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
      color: #f0f6fc;
    }

    .item span,
    .item p {
      margin: 0;
      color: #aebed0;
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border: 1px solid rgba(100, 214, 190, 0.22);
      border-radius: 999px;
      background: rgba(100, 214, 190, 0.06);
      color: #c8d7e6;
      font-size: 11px;
      overflow-wrap: anywhere;
      clip-path: polygon(7px 0, 100% 0, 100% calc(100% - 7px), calc(100% - 7px) 100%, 0 100%, 0 7px);
    }

    .ok {
      color: var(--accent);
      text-shadow: 0 0 14px rgba(100, 214, 190, 0.22);
    }

    .warn {
      color: var(--accent-2);
      text-shadow: 0 0 14px rgba(242, 193, 95, 0.18);
    }

    .fail {
      color: var(--danger);
      text-shadow: 0 0 14px rgba(255, 107, 116, 0.18);
    }

    a {
      color: var(--blue);
      text-decoration-color: rgba(115, 183, 255, 0.42);
    }

    @media (max-width: 820px) {
      body {
        overflow: hidden;
      }

      .app {
        min-height: 100vh;
      }

      .report {
        grid-template-columns: 1fr;
        height: min(78vh, 680px);
      }

      .app.report-open .report-toggle {
        bottom: min(78vh, 680px);
      }

      .toolbar {
        align-items: flex-start;
      }

      .toolbar-group {
        flex-wrap: wrap;
      }

      .toolbar-group.filters {
        justify-content: flex-start;
      }

      .search {
        width: 68vw;
      }

      .title {
        max-width: 72vw;
        flex-basis: 100%;
      }

      .metric-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .legend {
        display: none;
      }

      .axis-hud {
        right: 12px;
        bottom: 64px;
        width: min(360px, calc(100vw - 24px));
      }

      .app.report-open .axis-hud {
        bottom: calc(min(78vh, 680px) + 62px);
      }

      .detail {
        top: auto;
        right: 12px;
        bottom: 104px;
        max-height: min(34vh, 300px);
      }

      .status {
        max-width: calc(100vw - 168px);
      }
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <main class="app">
    <section class="viewer" aria-label="3D Atom Viewer">
      <div id="scene"></div>
      <div id="drop" class="drop">Drop viewer data</div>
      <div class="toolbar">
        <div class="toolbar-group primary">
          <button id="reset" class="button" type="button" title="Reset camera">Reset</button>
        </div>
        <div class="toolbar-group layers">
          <span class="toolbar-label">Layers</span>
          <label class="toggle"><input id="toggle-atoms" type="checkbox" checked>Atoms</label>
          <label class="toggle"><input id="toggle-groups" type="checkbox" checked>Molecules</label>
          <label class="toggle"><input id="toggle-edges" type="checkbox" checked>Edges</label>
        </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { ShaderPass } from "three/addons/postprocessing/ShaderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { BokehPass } from "three/addons/postprocessing/BokehPass.js";
    import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

    const container = document.getElementById("scene");
    const appEl = document.querySelector(".app");
    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("title");
    const dropEl = document.getElementById("drop");
    const fileEl = document.getElementById("file");
    const resetEl = document.getElementById("reset");
    const reportToggleEl = document.getElementById("report-toggle");
    const reportEl = document.getElementById("report");
    const detailEl = document.getElementById("detail");
    const legendEl = document.getElementById("legend");
    const axisHudEl = document.getElementById("axis-hud");
    const viewModeEl = document.getElementById("view-mode");
    const familyFilterEl = document.getElementById("family-filter");
    const statusFilterEl = document.getElementById("status-filter");
    const moleculeFilterEl = document.getElementById("molecule-filter");
    const searchEl = document.getElementById("search");
    const toggles = {
      atoms: document.getElementById("toggle-atoms"),
      groups: document.getElementById("toggle-groups"),
      edges: document.getElementById("toggle-edges")
    };
    const labelTextureAtlas = new Map();

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d1015);
    scene.fog = new THREE.FogExp2(0x0d1015, 0.00078);
    const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 4000);
    const atomGroup = new THREE.Group();
    const moleculeGroup = new THREE.Group();
    const edgeGroup = new THREE.Group();
    const spatialContextGroup = createSpatialContextGroup();
    scene.add(spatialContextGroup, atomGroup, moleculeGroup, edgeGroup);
    const ambientFillLight = new THREE.HemisphereLight(0xdfe9ff, 0x171d25, 0.7);
    const keyLight = new THREE.DirectionalLight(0xffffff, 2.15);
    keyLight.position.set(120, 180, 95);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 20;
    keyLight.shadow.camera.far = 620;
    keyLight.shadow.camera.left = -420;
    keyLight.shadow.camera.right = 420;
    keyLight.shadow.camera.top = 320;
    keyLight.shadow.camera.bottom = -320;
    keyLight.shadow.bias = -0.00018;
    const rimLight = new THREE.DirectionalLight(0x9bc7ff, 0.9);
    rimLight.position.set(-170, 105, -150);
    scene.add(ambientFillLight, keyLight, rimLight);
    const groundShadow = createGroundShadow();
    scene.add(groundShadow);

    const BLOOM_LAYER = 1;
    const bloomLayer = new THREE.Layers();
    bloomLayer.set(BLOOM_LAYER);
    const darkBloomMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const darkBloomLineMaterial = new THREE.LineBasicMaterial({ color: 0x000000 });
    const darkBloomSpriteMaterial = new THREE.SpriteMaterial({ color: 0x000000 });
    const bloomMaskedMaterials = new Map();
    const silenceHatchAlphaMap = createSilenceHatchAlphaMap();
    let bloomComposer = null;
    let finalComposer = null;
    let bokehPass = null;
    let vignettePass = null;
    let bloomRegisteredCount = 0;
    let cameraTween = null;

    let renderer = await createRenderer();
    configureSceneEnvironment(renderer);
    container.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    resetCamera();
    configureSelectiveBloomComposers(renderer);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const scratchMatrix = new THREE.Matrix4();
    const scratchColor = new THREE.Color();
    let currentData = null;
    let currentLabel = "archsig-atom-viewer-data.json";
    let currentCompanions = {};
    let renderedAtoms = [];
    let renderedGroups = [];
    let renderedEdgeCount = 0;
    let atomInstanceMesh = null;
    let selectedAtomKey = null;
    let activeLayoutContext = null;
    let activeTourState = null;

    const colorByStatus = {
      observed: 0x4cc3a7,
      inferred: 0x66a6ff,
      partial: 0xe0b84e,
      missing: 0xef6767,
      blocked: 0xef6767
    };

    const colorByFamily = {
      authority: 0xef6767,
      capability: 0x8bd46e,
      component: 0x73b7ff,
      contract: 0xf2c15f,
      contractSpecification: 0xf2cf66,
      effect: 0x4cc3a7,
      existence: 0x9aa8b8,
      permission: 0xff8f5a,
      relation: 0xb087ff,
      runtime: 0xff8f5a,
      semantic: 0xd8dee9,
      state: 0x66a6ff,
      trust: 0xe0b84e
    };

    async function createRenderer() {
      const preferWebGpu = new URLSearchParams(window.location.search).get("renderer") === "webgpu";
      if (preferWebGpu && navigator.gpu) {
        try {
          const module = await import("three/addons/renderers/webgpu/WebGPURenderer.js");
          const webgpu = new module.default({ antialias: true });
          await webgpu.init();
          configureRendererQuality(webgpu);
          status("WebGPU renderer");
          return webgpu;
        } catch (error) {
          status("WebGL renderer");
        }
      }
      const webgl = new THREE.WebGLRenderer({ antialias: true });
      configureRendererQuality(webgl);
      status("WebGL renderer");
      return webgl;
    }

    function viewerPixelRatio() {
      return Math.min(window.devicePixelRatio || 1, 2);
    }

    function configureRendererQuality(targetRenderer) {
      if (typeof targetRenderer.setPixelRatio === "function") {
        targetRenderer.setPixelRatio(viewerPixelRatio());
      }
      targetRenderer.toneMapping = THREE.ACESFilmicToneMapping;
      targetRenderer.toneMappingExposure = 1.05;
      targetRenderer.outputColorSpace = THREE.SRGBColorSpace;
      if (targetRenderer.shadowMap) {
        targetRenderer.shadowMap.enabled = true;
        targetRenderer.shadowMap.type = THREE.PCFSoftShadowMap;
      }
    }

    function configureSceneEnvironment(targetRenderer) {
      try {
        const pmrem = new THREE.PMREMGenerator(targetRenderer);
        const room = new RoomEnvironment();
        scene.environment = pmrem.fromScene(room, 0.04).texture;
        scene.userData.environmentSource = "RoomEnvironment PMREM";
        room.dispose();
        pmrem.dispose();
      } catch (_error) {
        scene.userData.environmentSource = "RoomEnvironment PMREM unavailable";
      }
    }

    function configureSelectiveBloomComposers(targetRenderer) {
      try {
        const baseRenderPass = new RenderPass(scene, camera);
        const bloomRenderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(1, 1), 0.7, 0.55, 0.12);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 0.7;
        bloomPass.radius = 0.48;
        bloomComposer = new EffectComposer(targetRenderer);
        bloomComposer.renderToScreen = false;
        bloomComposer.addPass(bloomRenderPass);
        bloomComposer.addPass(bloomPass);
        const finalPass = new ShaderPass(new THREE.ShaderMaterial({
          uniforms: {
            baseTexture: { value: null },
            bloomTexture: { value: bloomComposer.renderTarget2.texture }
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform sampler2D baseTexture;
            uniform sampler2D bloomTexture;
            varying vec2 vUv;
            void main() {
              gl_FragColor = texture2D(baseTexture, vUv) + vec4(1.0) * texture2D(bloomTexture, vUv);
            }
          `
        }), "baseTexture");
        finalPass.needsSwap = true;
        finalComposer = new EffectComposer(targetRenderer);
        finalComposer.addPass(baseRenderPass);
        finalComposer.addPass(finalPass);
        bokehPass = new BokehPass(scene, camera, {
          focus: camera.position.distanceTo(controls.target),
          aperture: 0.000055,
          maxblur: 0.008,
          width: 1,
          height: 1
        });
        finalComposer.addPass(bokehPass);
        finalComposer.addPass(new OutputPass());
        vignettePass = createVignettePass();
        finalComposer.addPass(vignettePass);
        scene.userData.selectiveBloomStatus = "enabled";
        scene.userData.silenceDepthStatus = "fog-exp2-bokeh";
      } catch (_error) {
        bloomComposer = null;
        finalComposer = null;
        bokehPass = null;
        vignettePass = null;
        scene.userData.selectiveBloomStatus = "unavailable";
        scene.userData.silenceDepthStatus = "fallback-no-bokeh";
      }
    }

    function createVignettePass() {
      return new ShaderPass(new THREE.ShaderMaterial({
        uniforms: {
          tDiffuse: { value: null },
          offset: { value: 1.08 },
          darkness: { value: 0.28 }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform float offset;
          uniform float darkness;
          varying vec2 vUv;
          void main() {
            vec4 color = texture2D(tDiffuse, vUv);
            vec2 uv = (vUv - vec2(0.5)) * vec2(offset);
            color.rgb = mix(color.rgb, color.rgb * (1.0 - darkness), dot(uv, uv));
            gl_FragColor = color;
          }
        `
      }), "tDiffuse");
    }

    function createSilenceHatchAlphaMap() {
      const canvas = document.createElement("canvas");
      canvas.width = 96;
      canvas.height = 96;
      const context = canvas.getContext("2d");
      context.fillStyle = "rgba(255,255,255,0.18)";
      context.fillRect(0, 0, canvas.width, canvas.height);
      context.strokeStyle = "rgba(255,255,255,0.42)";
      context.lineWidth = 2;
      for (let offset = -96; offset < 192; offset += 12) {
        context.beginPath();
        context.moveTo(offset, 96);
        context.lineTo(offset + 96, 0);
        context.stroke();
      }
      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(3, 3);
      return texture;
    }

    function createGroundShadow() {
      const geometry = new THREE.PlaneGeometry(2200, 2200);
      const material = new THREE.ShadowMaterial({
        color: 0x06080c,
        opacity: 0.28,
        transparent: true
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.y = -24;
      mesh.receiveShadow = true;
      mesh.userData.kind = "groundShadowReceiver";
      return mesh;
    }

    function createSpatialContextGroup() {
      const group = new THREE.Group();
      group.userData.kind = "visualProjectionContext";
      const gridVertices = [];
      const gridSize = 520;
      const step = 40;
      for (let value = -gridSize; value <= gridSize; value += step) {
        gridVertices.push(-gridSize, -23.8, value, gridSize, -23.8, value);
        gridVertices.push(value, -23.8, -gridSize, value, -23.8, gridSize);
      }
      const gridGeometry = new THREE.BufferGeometry();
      gridGeometry.setAttribute("position", new THREE.Float32BufferAttribute(gridVertices, 3));
      const grid = new THREE.LineSegments(
        gridGeometry,
        new THREE.LineBasicMaterial({
          color: 0x385063,
          transparent: true,
          opacity: 0.22,
          depthWrite: false
        })
      );
      grid.userData = {
        kind: "visualProjectionGrid",
        nonClaim: "visual projection only; not semantic distance, causality, or equivalence"
      };
      group.add(grid);

      const axisVertices = [
        -gridSize, -23.4, 0, gridSize, -23.4, 0,
        0, -23.2, -gridSize, 0, -23.2, gridSize,
        0, -24, 0, 0, 140, 0
      ];
      const axisGeometry = new THREE.BufferGeometry();
      axisGeometry.setAttribute("position", new THREE.Float32BufferAttribute(axisVertices, 3));
      const axes = new THREE.LineSegments(
        axisGeometry,
        new THREE.LineBasicMaterial({ color: 0x9fb3c8, transparent: true, opacity: 0.34, depthWrite: false })
      );
      axes.userData = { kind: "visualProjectionAxes" };
      group.add(axes);

      const plate = createTextSprite("visual projection coordinates; not distance, cause, or equivalence", "#d8dee9", "rgba(10,15,24,0.62)");
      plate.position.set(0, -15, 118);
      plate.scale.set(44, 7, 1);
      plate.userData = { kind: "coordinateNonClaimPlate", labelPriorityScore: 92, alwaysVisibleLabel: true };
      group.add(plate);

      [["X", gridSize + 28, -18, 0], ["Y", 0, 142, 0], ["Z", 0, -18, gridSize + 28]].forEach(([label, x, y, z]) => {
        const sprite = createTextSprite(label, "#f3f7fb", "rgba(56,80,99,0.58)");
        sprite.position.set(x, y, z);
        sprite.scale.set(8, 3, 1);
        sprite.userData = { kind: "coordinateAxisLabel", labelPriorityScore: 72, alwaysVisibleLabel: true };
        group.add(sprite);
      });
      return group;
    }

    function status(text) {
      statusEl.textContent = text;
    }

    function resize() {
      const rect = container.getBoundingClientRect();
      if (typeof renderer.setPixelRatio === "function") {
        renderer.setPixelRatio(viewerPixelRatio());
      }
      renderer.setSize(rect.width, rect.height, false);
      if (bloomComposer && finalComposer) {
        if (typeof bloomComposer.setPixelRatio === "function") bloomComposer.setPixelRatio(viewerPixelRatio());
        if (typeof finalComposer.setPixelRatio === "function") finalComposer.setPixelRatio(viewerPixelRatio());
        bloomComposer.setSize(rect.width, rect.height);
        finalComposer.setSize(rect.width, rect.height);
      }
      camera.aspect = Math.max(rect.width, 1) / Math.max(rect.height, 1);
      camera.updateProjectionMatrix();
    }

    function resetCamera() {
      cameraTween = null;
      camera.position.set(180, 130, 220);
      camera.lookAt(0, 0, 0);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateRepairMorphAnimation();
      renderFrame();
    }

    function renderFrame() {
      updateCameraTween();
      if (!bloomComposer || !finalComposer) {
        updateLabelVisibility();
        renderWithoutComposer(renderer, scene, camera);
        return;
      }
      updateBokehFocus();
      updateLabelVisibility();
      scene.traverse(darkenNonBloomed);
      bloomComposer.render();
      scene.traverse(restoreBloomMaterials);
      finalComposer.render();
    }

    function updateBokehFocus() {
      if (!bokehPass?.materialBokeh?.uniforms?.focus) return;
      bokehPass.materialBokeh.uniforms.focus.value = camera.position.distanceTo(controls.target);
    }

    function startCameraTween(targetPosition, targetLookAt) {
      cameraTween = {
        startedAt: performance.now(),
        duration: 620,
        fromPosition: camera.position.clone(),
        toPosition: targetPosition.clone(),
        fromTarget: controls.target.clone(),
        toTarget: targetLookAt.clone()
      };
    }

    function updateCameraTween() {
      if (!cameraTween) return;
      const elapsed = performance.now() - cameraTween.startedAt;
      const t = Math.min(elapsed / cameraTween.duration, 1);
      const eased = t * t * (3 - 2 * t);
      camera.position.copy(cameraTween.fromPosition).lerp(cameraTween.toPosition, eased);
      controls.target.copy(cameraTween.fromTarget).lerp(cameraTween.toTarget, eased);
      controls.update();
      if (t >= 1) cameraTween = null;
    }

    function updateLabelVisibility() {
      const sprites = [];
      [spatialContextGroup, atomGroup, moleculeGroup, edgeGroup].forEach((group) => {
        group.traverse((object) => {
          if (!object.isSprite || !object.material) return;
          sprites.push(object);
        });
      });
      const rect = renderer.domElement.getBoundingClientRect();
      const occupied = [];
      sprites.sort((a, b) => labelPriorityScore(b) - labelPriorityScore(a));
      sprites.forEach((sprite) => {
        const projected = sprite.position.clone().project(camera);
        const visible = projected.z >= -1 && projected.z <= 1;
        const x = (projected.x * 0.5 + 0.5) * rect.width;
        const y = (-projected.y * 0.5 + 0.5) * rect.height;
        const box = { x: x - 48, y: y - 14, width: 96, height: 28 };
        const collides = occupied.some((item) => boxesOverlap(box, item));
        const keep = visible && (!collides || sprite.userData?.alwaysVisibleLabel);
        const distance = camera.position.distanceTo(sprite.position);
        const fade = sprite.userData?.alwaysVisibleLabel ? 1 : THREE.MathUtils.clamp(1.18 - distance / 520, 0.18, 0.92);
        sprite.material.opacity = keep ? fade : 0;
        sprite.material.transparent = true;
        sprite.visible = keep;
        if (keep) occupied.push(box);
      });
      window.__archsigViewerLabelStats = {
        atlasSize: labelTextureAtlas.size,
        labelCount: sprites.length,
        visibleLabelCount: occupied.length
      };
    }

    function boxesOverlap(a, b) {
      return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
    }

    function labelPriorityScore(sprite) {
      if (Number.isFinite(Number(sprite.userData?.labelPriorityScore))) return Number(sprite.userData.labelPriorityScore);
      const kind = String(sprite.userData?.kind || "");
      if (kind.includes("holonomyLikeGap") || kind.includes("coordinateNonClaim")) return 100;
      if (kind.includes("SharedAtom")) return 82;
      if (kind.includes("Axis")) return 72;
      return 30;
    }

    function cameraTargetForMode(mode) {
      const presets = {
        holonomy: [new THREE.Vector3(155, 120, 205), new THREE.Vector3(0, 6, 0)],
        obstructionLoops: [new THREE.Vector3(180, 115, 190), new THREE.Vector3(0, 12, 0)],
        obstructions: [new THREE.Vector3(210, 120, 185), new THREE.Vector3(0, 8, 0)],
        curvature: [new THREE.Vector3(160, 150, 230), new THREE.Vector3(0, 0, 0)],
        flatness: [new THREE.Vector3(160, 150, 230), new THREE.Vector3(0, 0, 0)],
        spectrum: [new THREE.Vector3(170, 145, 220), new THREE.Vector3(0, 0, 0)],
        projection: [new THREE.Vector3(190, 130, 210), new THREE.Vector3(0, 8, 0)],
        molecules: [new THREE.Vector3(200, 150, 230), new THREE.Vector3(0, 0, 0)]
      };
      const [position, target] = presets[mode] || [new THREE.Vector3(180, 130, 220), new THREE.Vector3(0, 0, 0)];
      return { position, target };
    }

    function handleViewModeChange() {
      const target = cameraTargetForMode(viewModeEl.value);
      renderScene();
      startCameraTween(target.position, target.target);
    }

    function renderWithoutComposer(targetRenderer, targetScene, targetCamera) {
      targetRenderer.render(targetScene, targetCamera);
    }

    function darkenNonBloomed(object) {
      if (!object.material || bloomLayer.test(object.layers)) return;
      bloomMaskedMaterials.set(object.uuid, object.material);
      object.material = darkMaterialForObject(object);
    }

    function restoreBloomMaterials(object) {
      const material = bloomMaskedMaterials.get(object.uuid);
      if (!material) return;
      object.material = material;
      bloomMaskedMaterials.delete(object.uuid);
    }

    function darkMaterialForObject(object) {
      if (object.isLine || object.isLineSegments) return darkBloomLineMaterial;
      if (object.isSprite) return darkBloomSpriteMaterial;
      return darkBloomMaterial;
    }

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();
        disposeObject(child);
      }
    }

    function disposeObject(object) {
      if (object.geometry) object.geometry.dispose();
      const materials = Array.isArray(object.material) ? object.material : [object.material].filter(Boolean);
      materials.forEach((material) => {
        Object.values(material).forEach((value) => {
          if (value && typeof value === "object" && typeof value.dispose === "function" && value.isTexture && !value.userData?.sharedLabelAtlas) {
            value.dispose();
          }
        });
        material.dispose();
      });
      if (object.children) object.children.forEach(disposeObject);
    }

    async function loadCompanionReports() {
      const [summary, manifest] = await Promise.all([
        fetchJsonIfAvailable("./archsig-analysis-summary.json"),
        fetchJsonIfAvailable("./archsig-run-manifest.json")
      ]);
      return { summary, manifest };
    }

    async function fetchJsonIfAvailable(path) {
      try {
        const response = await fetch(path);
        if (!response.ok) return null;
        return await response.json();
      } catch (_error) {
        return null;
      }
    }

    function renderData(data, label = "archsig-atom-viewer-data.json", companions = {}) {
      currentData = data || {};
      currentLabel = label;
      currentCompanions = companions || {};
      if (titleEl) titleEl.textContent = label;
      appEl.classList.toggle("data-loaded", hasViewerContent(currentData));
      populateFilters(currentData);
      renderScene();
      renderReport(currentData, currentCompanions);
      resize();
    }

    function hasViewerContent(data) {
      return (Array.isArray(data?.atomNodes) && data.atomNodes.length > 0)
        || Boolean(data?.decisionBar)
        || (Array.isArray(data?.insightQueue) && data.insightQueue.length > 0)
        || (Array.isArray(data?.viewerVisualScenes) && data.viewerVisualScenes.length > 0);
    }

    function renderScene() {
      if (!currentData) return;
      clearGroup(atomGroup);
      clearGroup(moleculeGroup);
      clearGroup(edgeGroup);
      atomInstanceMesh = null;
      selectedAtomKey = null;
      detailEl.hidden = true;

      const allNodes = Array.isArray(currentData.atomNodes) ? currentData.atomNodes : [];
      const allGroups = Array.isArray(currentData.moleculeGroups) ? currentData.moleculeGroups : [];
      const edges = Array.isArray(currentData.atomEdges) ? currentData.atomEdges : [];
      renderedAtoms = filterNodes(allNodes);
      renderedGroups = filterGroups(allGroups);
      renderedEdgeCount = 0;
      bloomRegisteredCount = 0;

      const positions = new Map();
      activeLayoutContext = buildLayoutContext(renderedAtoms, renderedGroups, currentData);
      renderedAtoms.forEach((node, index) => positions.set(node.nodeId, nodePosition(node, index, renderedAtoms.length, activeLayoutContext)));
      renderAtomInstances(renderedAtoms, positions);
      if (shouldRenderAtomGlyphs(viewModeEl.value)) {
        renderAtomGlyphOverlays(renderedAtoms, positions, activeLayoutContext);
      }
      renderMoleculeGroups(renderedGroups, positions, activeLayoutContext);
      renderViewerDistanceBonds(positions, activeLayoutContext);
      renderedEdgeCount = renderEdges(edges, positions);
      const activeScene = sceneForMode(viewModeEl.value);
      const edgeChildrenBeforeSceneLayers = edgeGroup.children.length;
      renderSceneLayers(activeScene, positions);
      applySceneShadowFlags();
      window.__archsigViewerDebug = {
        ...(window.__archsigViewerDebug || {}),
        activeSceneId: activeScene?.sceneId || null,
        activeSceneStatus: activeScene?.sceneStatus || null,
        activeSceneLayerCount: Array.isArray(activeScene?.layers) ? activeScene.layers.length : 0,
        hasGluingGeometry: Boolean(activeLayoutContext?.aat?.gluingGeometry?.schema),
        sceneLayerObjectDelta: edgeGroup.children.length - edgeChildrenBeforeSceneLayers,
        selectiveBloomStatus: scene.userData.selectiveBloomStatus || "unknown",
        silenceDepthStatus: scene.userData.silenceDepthStatus || "unknown",
        bloomLayer: BLOOM_LAYER,
        bloomRegisteredCount
      };
      renderLegend();
      renderAxisHud();
      updateVisibility();
      window.__archsigViewerSceneGroups = [spatialContextGroup, atomGroup, moleculeGroup, edgeGroup];
      statusText(allNodes, edges);
    }

    function applySceneShadowFlags() {
      [atomGroup, moleculeGroup, edgeGroup].forEach((group) => {
        group.traverse((object) => {
          if (object.isMesh || object.isInstancedMesh) {
            object.castShadow = true;
            object.receiveShadow = true;
          }
        });
      });
      groundShadow.receiveShadow = true;
      groundShadow.castShadow = false;
    }

    function registerMeasuredBloom(object, role, intensity = 0.55) {
      if (!object || !object.layers) return;
      object.layers.enable(BLOOM_LAYER);
      object.userData = {
        ...(object.userData || {}),
        measuredBloom: true,
        bloomRole: role
      };
      bloomRegisteredCount += 1;
      const materials = Array.isArray(object.material) ? object.material : [object.material].filter(Boolean);
      materials.forEach((material) => {
        if (!("emissive" in material)) return;
        material.emissive = material.emissive || new THREE.Color(0x000000);
        material.emissive.lerp(new THREE.Color(material.color || 0xffffff), 0.52);
        material.emissiveIntensity = Math.max(Number(material.emissiveIntensity || 0), intensity);
      });
    }

    function registerReadingBloom(object, role, intensity = 0.45) {
      if (!object || !object.layers) return;
      object.layers.enable(BLOOM_LAYER);
      object.userData = {
        ...(object.userData || {}),
        readingBloom: true,
        measuredBloom: false,
        bloomRole: role
      };
      bloomRegisteredCount += 1;
      const materials = Array.isArray(object.material) ? object.material : [object.material].filter(Boolean);
      materials.forEach((material) => {
        if (!("emissive" in material)) return;
        material.emissive = material.emissive || new THREE.Color(0x000000);
        material.emissive.lerp(new THREE.Color(0xf2c15f), 0.48);
        material.emissiveIntensity = Math.max(Number(material.emissiveIntensity || 0), intensity);
      });
    }

    function createSilenceGlassMaterial(opacity = 0.12) {
      return new THREE.MeshPhysicalMaterial({
        color: 0x8a94a3,
        transparent: true,
        opacity,
        roughness: 0.82,
        metalness: 0.0,
        transmission: 0.18,
        alphaMap: silenceHatchAlphaMap,
        depthWrite: false,
        side: THREE.DoubleSide
      });
    }

    function biasObjectIntoSilenceDepth(object, amount, reason) {
      const direction = new THREE.Vector3();
      camera.getWorldDirection(direction);
      object.position.addScaledVector(direction, amount);
      object.userData = {
        ...(object.userData || {}),
        silenceDepthBias: amount,
        silenceDepthReason: reason,
        measuredFocus: false
      };
    }

    function cohomologyDegreeLayer(degree) {
      const layers = {
        h0: { y: -20, label: "H0 ground context layer" },
        h1: { y: 16, label: "H1 cocycle ribbon layer" },
        h2: { y: 55, label: "H2 silent glass ceiling" }
      };
      return layers[degree] || layers.h0;
    }

    function pointOnCohomologyLayer(point, degree, offset = 0) {
      const layer = cohomologyDegreeLayer(degree);
      const next = point.clone();
      next.y = layer.y + offset;
      return next;
    }

    function tagCohomologyLayer(object, degree, source) {
      const layer = cohomologyDegreeLayer(degree);
      object.userData = {
        ...(object.userData || {}),
        cohomologyDegree: degree,
        cohomologyLayerY: layer.y,
        cohomologyLayerLabel: layer.label,
        cohomologyLayerSource: source
      };
    }

    function renderAtomInstances(nodes, positions) {
      if (!nodes.length) return;
      const geometry = new THREE.SphereGeometry(1, nodes.length > 8000 ? 8 : 12, nodes.length > 8000 ? 6 : 8);
      const material = new THREE.MeshStandardMaterial({ roughness: 0.56, metalness: 0.04 });
      atomInstanceMesh = new THREE.InstancedMesh(geometry, material, nodes.length);
      atomInstanceMesh.userData.kind = "atomInstances";
      const scale = new THREE.Vector3();
      nodes.forEach((node, index) => {
        const radius = nodeRadius(node);
        const p = positions.get(node.nodeId);
        scratchMatrix.compose(p, new THREE.Quaternion(), scale.set(radius, radius, radius));
        atomInstanceMesh.setMatrixAt(index, scratchMatrix);
        atomInstanceMesh.setColorAt(index, scratchColor.setHex(nodeColor(node)));
      });
      atomInstanceMesh.instanceMatrix.needsUpdate = true;
      if (atomInstanceMesh.instanceColor) atomInstanceMesh.instanceColor.needsUpdate = true;
      atomGroup.add(atomInstanceMesh);
    }

    function renderAtomGlyphOverlays(nodes, positions, layoutContext) {
      const glyphs = layoutContext?.aat?.atomGlyphByRef || new Map();
      if (!glyphs.size) return;
      nodes.slice(0, 2000).forEach((node) => {
        const glyph = glyphs.get(node.nodeId);
        if (!glyph) return;
        const p = positions.get(node.nodeId);
        if (!p) return;
        const valence = Math.min(Number(glyph.valence || 0), 12);
        const blockedAnchor = String(glyph.semanticAnchor || "").includes("blocked");
        const fiber = String(glyph.fiber || node.atomKind || "unknown");
        const carrier = String(glyph.carrier || node.subject || "");
        const baseSize = 2.2 + valence * 0.14;
        const geometry = atomGlyphGeometry(fiber, baseSize, blockedAnchor);
        const color = atomGlyphColor(fiber, carrier, blockedAnchor);
        const material = new THREE.MeshStandardMaterial({
          color,
          transparent: true,
          opacity: blockedAnchor ? 0.86 : 0.58,
          roughness: 0.48,
          metalness: 0.03,
          wireframe: blockedAnchor
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(p);
        mesh.rotation.x = Math.PI / 2 + (hashText(fiber) % 9) * 0.07;
        mesh.rotation.y = (hashText(carrier) % 17) * 0.11;
        mesh.scale.setScalar(1 + Math.min(carrier.length, 24) * 0.008);
        mesh.userData = { kind: "atomInternalGlyph", item: glyph, node };
        atomGroup.add(mesh);
      });
    }

    function shouldRenderAtomGlyphs(mode) {
      return !new Set([
        "aatAxes",
        "curvature",
        "flatness",
        "holonomy",
        "obstructionLoops",
        "obstructions",
        "spectrum"
      ]).has(mode);
    }

    function atomGlyphGeometry(fiber, baseSize, blockedAnchor) {
      if (blockedAnchor) return new THREE.OctahedronGeometry(baseSize + 0.4, 0);
      const normalized = String(fiber || "").toLowerCase();
      if (normalized.includes("relation")) {
        return new THREE.TorusKnotGeometry(baseSize * 0.62, 0.14, 36, 6);
      }
      if (normalized.includes("component")) {
        return new THREE.TorusGeometry(baseSize, 0.16, 6, 18);
      }
      if (normalized.includes("operation") || normalized.includes("event")) {
        return new THREE.TetrahedronGeometry(baseSize * 0.94, 0);
      }
      return new THREE.DodecahedronGeometry(baseSize * 0.72, 0);
    }

    function atomGlyphColor(fiber, carrier, blockedAnchor) {
      if (blockedAnchor) return 0xff6b6b;
      const hue = (hashText(`${fiber}:${carrier}`) % 360) / 360;
      return new THREE.Color().setHSL(hue, 0.54, 0.58);
    }

    function renderMoleculeGroups(groups, positions, layoutContext) {
      const vertices = [];
      const colors = [];
      const centroids = [];
      groups.forEach((group, index) => {
        const refs = Array.isArray(group.atomObservationRefs) ? group.atomObservationRefs : [];
        const points = refs.map((ref) => positions.get(ref)).filter(Boolean);
        if (!points.length && familyFilterEl.value) return;
        const p = viewModeEl.value === "molecules" && layoutContext.moleculeCenters.has(group.groupId)
          ? layoutContext.moleculeCenters.get(group.groupId)
          : points.length ? centroid(points) : groupPosition(index, groups.length);
        positions.set(group.groupId, p);
        appendMoleculeBonds(group, points, p, index, vertices, colors);
        if (viewModeEl.value === "molecules" && points.length) {
          centroids.push({ group, center: p, index, count: points.length });
        }
      });
      renderMoleculeBondBuffer(vertices, colors);
      renderMoleculeCentroids(centroids);
    }

    function appendMoleculeBonds(group, points, center, index, vertices, colors) {
      if (!points.length) return;
      const color = scratchColor.setHex(0xe0b84e);
      for (const point of points) {
        vertices.push(center.x, center.y, center.z, point.x, point.y, point.z);
        colors.push(color.r, color.g, color.b, color.r, color.g, color.b);
      }
    }

    function renderMoleculeBondBuffer(vertices, colors) {
      if (!vertices.length) return;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: viewModeEl.value === "molecules" ? 0.36 : 0.2
      });
      const bonds = new THREE.LineSegments(geometry, material);
      bonds.userData = { kind: "moleculeBonds" };
      moleculeGroup.add(bonds);
    }

    function renderViewerDistanceBonds(positions, layoutContext) {
      if (viewModeEl.value !== "molecules") return;
      const distances = layoutContext?.aat?.viewerDistances || [];
      if (!distances.length) return;
      const vertices = [];
      const colors = [];
      distances.slice(0, 5000).forEach((distance) => {
        const source = positions.get(distance.source);
        const target = positions.get(distance.target);
        if (!source || !target) return;
        const value = Number.isFinite(distance.value) ? distance.value : 0;
        const colorHex = value >= 4 ? 0xff9468 : value >= 2 ? 0xf2c15f : 0x64d6be;
        scratchColor.setHex(colorHex);
        vertices.push(source.x, source.y, source.z, target.x, target.y, target.z);
        colors.push(scratchColor.r, scratchColor.g, scratchColor.b, scratchColor.r, scratchColor.g, scratchColor.b);
      });
      if (!vertices.length) return;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
      geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: vertices.length > 9000 ? 0.16 : 0.28
      });
      const bonds = new THREE.LineSegments(geometry, material);
      bonds.userData = { kind: "viewerDistanceInputs" };
      moleculeGroup.add(bonds);
    }

    function renderMoleculeCentroids(centroids) {
      centroids.forEach(({ group, center, index, count }) => {
        const centroidGeometry = new THREE.SphereGeometry(2.4 + Math.min(count, 80) * 0.025, 12, 8);
        const centroidMaterial = new THREE.MeshStandardMaterial({
          color: 0xe0b84e,
          transparent: true,
          opacity: 0.7,
          roughness: 0.55
        });
        const mesh = new THREE.Mesh(centroidGeometry, centroidMaterial);
        mesh.position.copy(center);
        mesh.userData = { kind: "moleculeCenter", item: group };
        moleculeGroup.add(mesh);
      });
    }

    function renderEdges(edges, positions) {
      const points = [];
      edges.forEach((edge) => {
        const source = positions.get(edge.sourceNodeRef);
        const target = positions.get(edge.targetNodeRef);
        if (!source || !target) return;
        points.push(source.x, source.y, source.z, target.x, target.y, target.z);
      });
      if (!points.length) return 0;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(points, 3));
      const material = new THREE.LineBasicMaterial({ color: 0x5f6f86, transparent: true, opacity: points.length > 9000 ? 0.22 : 0.42 });
      edgeGroup.add(new THREE.LineSegments(geometry, material));
      return points.length / 6;
    }

    function renderSceneLayers(scene, positions) {
      if (!scene || !Array.isArray(scene.layers) || scene.sceneStatus === "not_active_for_packet") return;
      const encodings = Array.isArray(scene.visualEncodings) ? scene.visualEncodings : [];
      const encodingById = new Map(encodings.map((encoding) => [encoding.encodingId, encoding]));
      renderGluingGeometry(scene, positions, encodings[0] || {});
      const refs = scene.primaryRefs || {};
      const atomRefs = Array.isArray(refs.atomRefs) ? refs.atomRefs : [];
      const contextRefs = Array.isArray(refs.contextRefs) ? refs.contextRefs : [];
      const points = [...atomRefs, ...contextRefs].map((ref) => positions.get(ref)).filter(Boolean);
      const center = points.length ? centroid(points) : new THREE.Vector3(0, 0, 0);
      scene.layers.forEach((layer, index) => {
        const encoding = encodingById.get(layer.encodingRef) || encodings[0] || {};
        const mesh = sceneLayerMesh(layer, encoding, center, index, points.length);
        if (!mesh) return;
        mesh.userData = { kind: "sceneLayer", scene, layer, encoding };
        edgeGroup.add(mesh);
      });
      if (points.length > 1) {
        const encoding = encodings[0] || {};
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        points.forEach((point) => vertices.push(center.x, center.y, center.z, point.x, point.y, point.z));
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.LineBasicMaterial({
          color: sceneColorHex(encoding.colorRole),
          transparent: true,
          opacity: 0.68
        });
        const lines = new THREE.LineSegments(geometry, material);
        lines.userData = { kind: "sceneLayerRefs", scene, encoding };
        edgeGroup.add(lines);
      }
    }

    function sceneLayerMesh(layer, encoding, center, index, supportCount) {
      const role = layer.geometryRole || encoding.shapeRole || "beacon";
      const color = sceneColorHex(encoding.colorRole);
      const size = 4 + Math.min(supportCount, 16) * 0.35 + index;
      let geometry;
      if (role.includes("ribbon") || role.includes("seam")) {
        geometry = new THREE.TorusGeometry(size * 1.7, 0.32, 8, 48);
      } else if (role.includes("cage") || role.includes("wall")) {
        geometry = new THREE.BoxGeometry(size * 2.4, size * 1.2, size * 0.28);
      } else if (role.includes("cut")) {
        geometry = new THREE.ConeGeometry(size, size * 2.4, 4);
      } else if (role.includes("patch")) {
        geometry = new THREE.CircleGeometry(size * 2.1, 32);
      } else {
        geometry = new THREE.SphereGeometry(size, 16, 10);
      }
      const material = new THREE.MeshStandardMaterial({
        color,
        transparent: true,
        opacity: role.includes("patch") ? 0.28 : 0.46,
        roughness: 0.44,
        metalness: 0.02,
        wireframe: role.includes("cage") || role.includes("wall")
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(center);
      mesh.position.y += 14 + index * 3;
      mesh.rotation.x = role.includes("patch") ? -Math.PI / 2 : Math.PI / 7;
      mesh.rotation.z = (hashText(layer.layerId || role) % 628) / 100;
      return mesh;
    }

    function renderGluingGeometry(scene, positions, encoding) {
      const geometry = activeLayoutContext?.aat?.gluingGeometry || {};
      if (!window.__archsigViewerDebug) {
        window.__archsigViewerDebug = {
          lastGluingSceneId: null,
          lastGluingObjectCount: 0,
          lastGluingObjectKinds: {},
          projectionBoundary: ""
        };
      }
      if (!geometry || !scene?.sceneId) return;
      const before = edgeGroup.children.length;
      if (scene.sceneId === "site-cover" || scene.sceneId === "cech-gluing") {
        renderNerveGeometry(scene, geometry.nerve || {}, positions, encoding);
      }
      if (scene.sceneId === "cech-h1-mismatch") {
        renderCocycleRibbon(scene, geometry.cocycleRibbon || {}, positions, encoding, geometry.renderLimits || {});
      }
      if (scene.sceneId === "hodge-debt-field") {
        renderLocusField(scene, geometry.locusField || {}, positions, geometry.renderLimits || {});
      }
      if (scene.sceneId === "analytic-overlay") {
        renderAnalyticOverlays(scene, geometry.analyticOverlayBundle || {}, positions, encoding, geometry.renderLimits || {});
      }
      if (scene.sceneId === "obstruction") {
        renderForbiddenCages(scene, geometry.forbiddenCages || [], positions, encoding, geometry.renderLimits || {});
      }
      if (scene.sceneId === "repair-dual") {
        renderRepairMorphs(scene, geometry.repairMorphs || [], positions, encoding, geometry.renderLimits || {});
      }
      const created = edgeGroup.children.slice(before);
      window.__archsigViewerDebug = {
        lastGluingSceneId: scene.sceneId,
        lastGluingObjectCount: created.length,
        lastGluingObjectKinds: created.reduce((counts, child) => {
          const kind = child.userData?.kind || "unknown";
          counts[kind] = (counts[kind] || 0) + 1;
          return counts;
        }, {}),
        projectionBoundary: geometry.projectionBoundary || ""
      };
    }

    function sceneAxisPosition(scene, ref, index, total, fallback, metrics = {}) {
      const axes = scene?.axisMapping || {};
      const bindings = scene?.axisMetricBindings || {};
      const totalSafe = Math.max(total || 1, 1);
      const rank = (index % totalSafe) / totalSafe;
      const xKey = bindings.x || "xValue";
      const yKey = bindings.y || "yValue";
      const zKey = bindings.z || "zValue";
      const blend = Number.isFinite(Number(bindings.fallbackBlend)) ? Number(bindings.fallbackBlend) : 0.35;
      const xValue = Number.isFinite(Number(metrics[xKey])) ? Number(metrics[xKey]) : rank;
      const yValue = Number.isFinite(Number(metrics[yKey])) ? Number(metrics[yKey]) : 0;
      const zValue = Number.isFinite(Number(metrics[zKey])) ? Number(metrics[zKey]) : 0;
      const xScale = 46 + (hashText(axes.x || "x") % 17);
      const yScale = 9 + (hashText(axes.y || "y") % 7);
      const zScale = 32 + (hashText(axes.z || "z") % 19);
      const phase = xValue * Math.PI * 2 + index * 0.11;
      const radius = zScale + Math.sqrt(index + 1) * 1.8 + Math.min(Math.abs(zValue), 12) * 5;
      const y = -26 + yValue * yScale + rank * 18;
      const axisPoint = new THREE.Vector3(Math.cos(phase) * (radius + xValue * xScale), y, Math.sin(phase) * radius);
      if (!fallback) return axisPoint;
      return axisPoint.lerp(fallback.clone(), blend);
    }

    function renderNerveGeometry(scene, nerve, positions, encoding) {
      const vertices = Array.isArray(nerve.vertices) ? nerve.vertices : [];
      const edges = Array.isArray(nerve.edges) ? nerve.edges : [];
      const triangles = Array.isArray(nerve.triangles) ? nerve.triangles : [];
      const vertexCenters = nerveVertexCenters(scene, vertices);
      vertices.forEach((vertex, index) => {
        const center = vertexCenters.get(String(vertex.contextRef || ""));
        if (!center) return;
        const supportSize = Math.min((vertex.atomRefs || []).length, 18);
        const patch = new THREE.Mesh(
          new THREE.CircleGeometry(8.2 + supportSize * 0.34, 36),
          new THREE.MeshStandardMaterial({
            color: 0x64d6be,
            transparent: true,
            opacity: 0.34,
            roughness: 0.52,
            side: THREE.DoubleSide
          })
        );
        patch.position.copy(center);
        patch.position.y = cohomologyDegreeLayer("h0").y + 1;
        patch.rotation.x = -Math.PI / 2;
        patch.userData = { kind: "nerveVertexPatch", item: vertex };
        tagCohomologyLayer(patch, "h0", "nerve.vertices");
        edgeGroup.add(patch);
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(3.2 + supportSize * 0.22, 24, 16),
          new THREE.MeshStandardMaterial({
            color: 0x64d6be,
            emissive: 0x082f2a,
            transparent: true,
            opacity: 0.68,
            roughness: 0.42
          })
        );
        sphere.position.copy(pointOnCohomologyLayer(center, "h0", 4.8 + supportSize * 0.08));
        sphere.userData = {
          kind: "nerveContextSphere",
          item: vertex,
          radiusDrivenBy: "nerve.vertices[].atomRefs.length",
          atomRefCount: (vertex.atomRefs || []).length
        };
        tagCohomologyLayer(sphere, "h0", "nerve.vertices.atomRefs");
        edgeGroup.add(sphere);
        const label = createTextSprite(contextLabel(vertex.contextRef), "#d8dee9", "rgba(13,16,21,0.68)");
        label.position.copy(pointOnCohomologyLayer(center, "h0", 11 + supportSize * 0.08));
        label.userData = { kind: "nerveVertexLabel", item: vertex };
        tagCohomologyLayer(label, "h0", "nerve.vertices");
        edgeGroup.add(label);
      });
      renderNerveEdges(edges, vertexCenters, encoding);
      const triangleLimit = activeLayoutContext?.aat?.gluingGeometry?.renderLimits?.nerveTriangles || 80;
      triangles.slice(0, triangleLimit).forEach((triangle, index) => {
        const points = (triangle.contextRefs || [])
          .map((ref) => {
            const point = vertexCenters.get(String(ref || ""));
            return point ? pointOnCohomologyLayer(point, "h2", index * 0.35) : null;
          })
          .filter(Boolean);
        if (points.length !== 3) return;
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.Float32BufferAttribute(points.flatMap((p) => [p.x, p.y, p.z]), 3));
        geometry.computeVertexNormals();
        const mesh = new THREE.Mesh(geometry, createSilenceGlassMaterial(0.12));
        mesh.userData = {
          kind: "nerveTriangleSilenceGlass",
          item: triangle,
          coherenceClaim: triangle.coherenceClaim || "not_visualized",
          h2CoherenceVisualized: false,
          silenceBoundary: "H^2 coherence is not visualized by this viewer layer"
        };
        tagCohomologyLayer(mesh, "h2", "nerve.triangles");
        biasObjectIntoSilenceDepth(mesh, 34, "coherenceClaim:not_visualized");
        edgeGroup.add(mesh);

    function nerveVertexCenters(scene, vertices) {

    function nerveEdgeKey(source, target) {
      return [String(source || ""), String(target || "")].sort().join("::");

    function triangleBoundaryKeys(triangle) {
      const refs = (triangle.contextRefs || []).map((ref) => String(ref || "")).filter(Boolean);
      if (refs.length !== 3) return null;
      return [
        nerveEdgeKey(refs[0], refs[1]),
        nerveEdgeKey(refs[1], refs[2]),
        nerveEdgeKey(refs[2], refs[0])
      ].sort().join("|");
    }

    function findTreePath(treeAdjacency, source, target) {
      const queue = [source];
      const previous = new Map([[source, null]]);
      while (queue.length) {
        const current = queue.shift();
        if (current === target) break;
        for (const next of treeAdjacency.get(current) || []) {
          if (previous.has(next)) continue;
          previous.set(next, current);
          queue.push(next);
        }
      }
      if (!previous.has(target)) return [];
      const path = [];
      for (let cursor = target; cursor !== null; cursor = previous.get(cursor)) {
        path.push(cursor);
      }
      return path.reverse();
    }

    function extractNerveGraphCycleBasis(edges, triangles, vertexCenters) {
      const parent = new Map();
      const treeAdjacency = new Map();
      const triangleBoundaries = new Set(
        triangles.map(triangleBoundaryKeys).filter(Boolean)
      );
      const ensure = (ref) => {
        if (!parent.has(ref)) parent.set(ref, ref);
        if (!treeAdjacency.has(ref)) treeAdjacency.set(ref, []);
      };
      const find = (ref) => {
        ensure(ref);
        let root = ref;
        while (parent.get(root) !== root) root = parent.get(root);
        while (parent.get(ref) !== ref) {
          const next = parent.get(ref);
          parent.set(ref, root);
          ref = next;
        }
        return root;
      };
      const cycles = [];
      edges.slice(0, 80).forEach((edge) => {
        const source = String(edge.sourceContextRef || "");
        const target = String(edge.targetContextRef || "");
        if (!source || !target || !vertexCenters.has(source) || !vertexCenters.has(target)) return;
        ensure(source);
        ensure(target);
        const sourceRoot = find(source);
        const targetRoot = find(target);
        if (sourceRoot !== targetRoot) {
          parent.set(sourceRoot, targetRoot);
          treeAdjacency.get(source).push(target);
          treeAdjacency.get(target).push(source);
          return;
        }
        const path = findTreePath(treeAdjacency, source, target);
        if (path.length < 2) return;
        const refs = [...path, source];
        const edgeKeys = [];
        for (let index = 0; index < refs.length - 1; index += 1) {
          edgeKeys.push(nerveEdgeKey(refs[index], refs[index + 1]));
        }
        const boundaryKey = edgeKeys.slice().sort().join("|");
        cycles.push({
          edge,
          refs,
          edgeKeys,
          filledByTriangleBoundary: triangleBoundaries.has(boundaryKey)
        });
      });
      return cycles;
    }

    function renderNerveGraphCycles(edges, triangles, vertexCenters) {

    function roundRect(context, x, y, width, height, radius) {
      context.beginPath();
      context.moveTo(x + radius, y);
      context.lineTo(x + width - radius, y);
      context.quadraticCurveTo(x + width, y, x + width, y + radius);
      context.lineTo(x + width, y + height - radius);
      context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      context.lineTo(x + radius, y + height);
      context.quadraticCurveTo(x, y + height, x, y + height - radius);
      context.lineTo(x, y + radius);
      context.quadraticCurveTo(x, y, x + radius, y);

    function locusFieldNumeric(value, fallback = 0) {
      const numeric = Number(value);
      return Number.isFinite(numeric) ? numeric : fallback;
    }

    function locusFieldSignedCurvature(row) {
      const signed = Number(row?.signedCurvature);
      if (Number.isFinite(signed)) return signed;
      return null;
    }

    function locusFieldSamplePoint(scene, row, index, count) {
      const signed = locusFieldSignedCurvature(row) ?? locusFieldNumeric(row?.height, 0);
      return sceneAxisPosition(scene, row?.fieldId || `field:${index}`, index, Math.max(count, 1), groupPosition(index, Math.max(count, 1), 58), {
        xValue: index / Math.max(count - 1, 1),
        yValue: signed,
        zValue: locusFieldNumeric(row?.harmonicMass, locusFieldNumeric(row?.height, 0))
      });
    }

    function curvatureHeightY(signedCurvature) {
      return THREE.MathUtils.clamp(signedCurvature, -2.5, 2.5) * 14;
    }

    function coolToWarmColor(value, minValue, maxValue) {
      const t = THREE.MathUtils.clamp((value - minValue) / Math.max(maxValue - minValue, 1.0e-9), 0, 1);
      const color = new THREE.Color();
      color.setHSL(0.62 - t * 0.58, 0.74, 0.52);
      return color;
    }

    function idwLocusValue(samples, x, z, key) {
      let numerator = 0;
      let denominator = 0;
      samples.forEach((sample) => {
        const dx = x - sample.point.x;
        const dz = z - sample.point.z;
        const weight = 1 / (dx * dx + dz * dz + 120);
        numerator += sample[key] * weight;
        denominator += weight;
      });
      return denominator ? numerator / denominator : 0;
    }

    function isInsideBlockedLocusHole(holes, x, z) {
      return holes.some((hole) => {
        const dx = x - hole.center.x;
        const dz = z - hole.center.z;
        return dx * dx + dz * dz < hole.radius * hole.radius;
      });
    }

    function createBlockedHoleRim(center, radius, index, item) {
      const vertices = [];
      const segments = 36;
      for (let step = 0; step < segments; step += 2) {
        const a0 = (step / segments) * Math.PI * 2;
        const a1 = ((step + 1) / segments) * Math.PI * 2;
        vertices.push(
          center.x + Math.cos(a0) * radius, -1.6, center.z + Math.sin(a0) * radius,
          center.x + Math.cos(a1) * radius, -1.6, center.z + Math.sin(a1) * radius
        );
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
      const rim = new THREE.LineSegments(
        geometry,
        new THREE.LineBasicMaterial({
          color: 0x8a94a3,
          transparent: true,
          opacity: 0.62,
          depthWrite: false
        })
      );
      rim.userData = {
        kind: "blockedLocusHoleRim",
        item,
        blockedHoleIndex: index,
        interpolationExcluded: true,
        silenceBoundary: "blocked region is left as a hole; not interpolated or red-error encoded",
        redErrorEncodingRemoved: true
      };
      biasObjectIntoSilenceDepth(rim, 58, "locusField.status:blocked");
      return rim;
    }

    function createLocusFieldMembrane(scene, samples, blockedHoles) {
      const xs = samples.map((sample) => sample.point.x);
      const zs = samples.map((sample) => sample.point.z);
      const minX = Math.min(...xs) - 34;
      const maxX = Math.max(...xs) + 34;
      const minZ = Math.min(...zs) - 30;
      const maxZ = Math.max(...zs) + 30;
      const columns = Math.max(6, Math.min(22, samples.length * 4));
      const rows = Math.max(5, Math.min(16, Math.ceil(samples.length * 2.5)));
      const masses = samples.map((sample) => sample.harmonicMass);
      const minMass = Math.min(...masses);
      const maxMass = Math.max(...masses);
      const positions = [];
      const colors = [];
      const indices = [];
      for (let zIndex = 0; zIndex < rows; zIndex += 1) {
        const z = THREE.MathUtils.lerp(minZ, maxZ, zIndex / Math.max(rows - 1, 1));
        for (let xIndex = 0; xIndex < columns; xIndex += 1) {
          const x = THREE.MathUtils.lerp(minX, maxX, xIndex / Math.max(columns - 1, 1));
          const signed = idwLocusValue(samples, x, z, "signedCurvature");
          const mass = idwLocusValue(samples, x, z, "harmonicMass");
          const y = curvatureHeightY(signed);
          const color = coolToWarmColor(mass, minMass, maxMass);
          positions.push(x, y, z);
          colors.push(color.r, color.g, color.b);
        }
      }
      for (let zIndex = 0; zIndex < rows - 1; zIndex += 1) {
        for (let xIndex = 0; xIndex < columns - 1; xIndex += 1) {
          const cx = THREE.MathUtils.lerp(minX, maxX, (xIndex + 0.5) / Math.max(columns - 1, 1));
          const cz = THREE.MathUtils.lerp(minZ, maxZ, (zIndex + 0.5) / Math.max(rows - 1, 1));
          if (isInsideBlockedLocusHole(blockedHoles, cx, cz)) continue;
          const a = zIndex * columns + xIndex;
          const b = a + 1;
          const c = a + columns;
          const d = c + 1;
          indices.push(a, c, b, b, c, d);
        }
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.Float32BufferAttribute(colors, 3));
      geometry.setIndex(indices);
      geometry.computeVertexNormals();
      const membrane = new THREE.Mesh(
        geometry,
        new THREE.MeshStandardMaterial({
          vertexColors: true,
          side: THREE.DoubleSide,
          transparent: true,
          opacity: 0.72,
          roughness: 0.54,
          metalness: 0.02
        })
      );
      membrane.userData = {
        kind: "curvatureHeightmapMembrane",
        sceneId: scene.sceneId,
        source: "locusField.fieldRows.signedCurvature",
        colorRole: "analytic_reading",
        projectionBoundary: "viewer projection only; no new structural verdict",
        interpolationNonClaim: "IDW interpolation is a window between measured cells, not a measured value between them",
        blockedHoleCount: blockedHoles.length
      };
      return membrane;
    }

    function renderLocusField(scene, field, positions, limits) {
      const rows = Array.isArray(field.fieldRows) ? field.fieldRows : [];
      const zeroRegions = Array.isArray(field.measuredZeroRegions) ? field.measuredZeroRegions : [];
      const blockedRegions = Array.isArray(field.blockedRegions) ? field.blockedRegions : [];
      const limitedRows = rows.slice(0, limits.curvatureFieldRows || 64);
      const signedRows = limitedRows.filter((row) => locusFieldSignedCurvature(row) !== null);
      const samples = signedRows.map((row, index) => {
        const point = locusFieldSamplePoint(scene, row, index, signedRows.length);
        const signedCurvature = locusFieldSignedCurvature(row) ?? 0;
        point.y = curvatureHeightY(signedCurvature);
        return {
          row,
          point,
          signedCurvature,
          harmonicMass: locusFieldNumeric(row.harmonicMass, Math.abs(signedCurvature)),

        };
      });
