        center: sceneAxisPosition(scene, region.regionId || `blocked:${index}`, index, Math.max(blockedRegions.length, 1), groupPosition(index, Math.max(blockedRegions.length, 1), 60), { xValue: index / Math.max(blockedRegions.length - 1, 1), yValue: 2, zValue: 2 }),
        radius: 18,
        region
      }));
      if (samples.length) {
        edgeGroup.add(createLocusFieldMembrane(scene, samples, blockedHoles));
      }
      samples.forEach((sample, index) => {
        const radius = 2.4 + THREE.MathUtils.clamp(sample.distanceToFlatness, 0, 4) * 0.42;
        const markerColor = Math.abs(sample.signedCurvature) < 1.0e-9
          ? 0x64d6be
          : sample.signedCurvature > 0 ? 0xf2c15f : 0x73b7ff;
        const marker = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 18, 12),
          new THREE.MeshStandardMaterial({
            color: markerColor,
            emissive: Math.abs(sample.signedCurvature) < 1.0e-9 ? 0x0b3d35 : 0x151515,
            roughness: 0.42,
            metalness: 0.02
          })
        );
        marker.position.copy(sample.point);
        marker.userData = {
          kind: "curvatureMeasuredCell",
          item: sample.row,
          measuredPoint: true,
          signedCurvature: sample.signedCurvature,
          colorRole: sample.row.colorRole || "analytic_reading",
          interpolationNonClaim: "this marker is measured; membrane between markers is IDW projection only"
        };
        edgeGroup.add(marker);

    function overlayGeometry(kind, size) {
      if (kind === "period_pairing_matrix") return new THREE.BoxGeometry(size * 1.8, size * 0.24, size);
      if (kind === "wasserstein_transfer_cost") return new THREE.ConeGeometry(size * 0.8, size * 1.8, 6);
      if (kind === "spectral_gap_proxy") return new THREE.CylinderGeometry(size * 0.65, size * 0.65, size * 1.4, 20);
      if (kind === "curvature_spectrum_hotspot") return new THREE.TorusKnotGeometry(size * 0.52, 0.28, 48, 8);
      if (kind === "singularity_concentration") return new THREE.OctahedronGeometry(size * 0.9);
      return new THREE.SphereGeometry(size, 16, 10);
    }

    function overlayMagnitude(overlay) {
      const candidates = [
        overlay.wassersteinTransferCost,
        overlay.transferResidue,
        overlay.spectralGap,
        overlay.concentrationCount
      ].map(Number).filter(Number.isFinite);
      if (Array.isArray(overlay.periodPairingMatrix)) {
        overlay.periodPairingMatrix.flat().map(Number).filter(Number.isFinite).forEach((value) => candidates.push(Math.abs(value)));
      }
      if (Array.isArray(overlay.hotspots)) {
        overlay.hotspots.map((item) => Number(item.hotspotWeight)).filter(Number.isFinite).forEach((value) => candidates.push(value));
      }
      return candidates.length ? Math.max(...candidates.map(Math.abs)) : 1;
    }

    function overlayLabel(overlay) {
      const label = String(overlay.overlayKind || "analytic").replace(/_/g, " ");
      return label.length > 26 ? `${label.slice(0, 25)}...` : label;

    function addLineSegments(vertices, color, opacity, kind, style = {}) {
      if (!vertices.length) return;
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute(vertices, 3));
      const lineRole = style.lineRole || "solid";
      const thicknessRole = style.thicknessRole || "thin";
      const dashed = lineRole.includes("dash") || lineRole.includes("broken");
      const material = dashed
        ? new THREE.LineDashedMaterial({
            color,
            transparent: true,
            opacity,
            dashSize: lineRole.includes("broken") ? 2.2 : 5.2,
            gapSize: lineRole.includes("broken") ? 1.8 : 3.4
          })
        : new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      const lines = new THREE.LineSegments(geometry, material);
      if (dashed && typeof lines.computeLineDistances === "function") lines.computeLineDistances();
      lines.userData = { kind, lineRole, thicknessRole, dashed };
      if (style.cohomologyDegree) tagCohomologyLayer(lines, style.cohomologyDegree, kind);
      edgeGroup.add(lines);
      if (thicknessRole === "thick") {
        const shadowGeometry = geometry.clone();
        const shadowMaterial = dashed
          ? new THREE.LineDashedMaterial({
              color,
              transparent: true,
              opacity: Math.min(opacity + 0.12, 1),
              dashSize: lineRole.includes("broken") ? 2.2 : 5.2,
              gapSize: lineRole.includes("broken") ? 1.8 : 3.4
            })
          : new THREE.LineBasicMaterial({ color, transparent: true, opacity: Math.min(opacity + 0.12, 1) });
        const shadow = new THREE.LineSegments(shadowGeometry, shadowMaterial);
        if (dashed && typeof shadow.computeLineDistances === "function") shadow.computeLineDistances();
        shadow.position.set(0.9, 0.55, 0.9);
        shadow.userData = { kind: `${kind}Thickness`, lineRole, thicknessRole, dashed, visualEncodingChannel: "thickness" };
        if (style.cohomologyDegree) tagCohomologyLayer(shadow, style.cohomologyDegree, `${kind}:thickness`);
        edgeGroup.add(shadow);
      }
    }

    function updateRepairMorphAnimation() {
      const t = (performance.now() % 2400) / 2400;
      const eased = 0.5 - Math.cos(t * Math.PI * 2) * 0.5;
      edgeGroup.children.forEach((child) => {
        if (child.userData?.kind !== "repairMorphMarker") return;
        const { start, target, phase } = child.userData;
        if (!start || !target) return;
        const local = (eased + Number(phase || 0)) % 1;
        child.position.copy(start).lerp(target, local);
      });
    }

    function sceneColorHex(role) {
      const colors = {
        measured_nonzero: 0xf2c15f,
        measured_zero: 0x64d6be,
        not_computed: 0xff6b6b,
        analytic_reading: 0x73b7ff,
        repair_candidate: 0xb087ff,
        source_evidence: 0x8bd46e,
        unknown: 0x9fb3c8,
        checked: 0x64d6be,
        assumed: 0x73b7ff,
        unmeasured: 0x8a96a8,
        violated: 0xff4d7a,
        not_applicable: 0x5f6f86
      };
      return colors[role] || 0xf2c15f;
    }

    function buildLayoutContext(nodes, groups, data) {
      const atomIndex = new Map(nodes.map((node, index) => [node.nodeId, index]));
      const membership = new Map();
      const moleculeCenters = new Map();
      groups.forEach((group, index) => {
        const center = groupPosition(index, Math.max(groups.length, 1), 54);
        moleculeCenters.set(group.groupId, center);
        const refs = Array.isArray(group.atomObservationRefs) ? group.atomObservationRefs : [];
        refs.forEach((ref, refIndex) => {
          if (!atomIndex.has(ref)) return;
          if (!membership.has(ref)) membership.set(ref, []);
          membership.get(ref).push({ group, groupIndex: index, refIndex, center });
        });
      });
      return {
        atomIndex,
        membership,
        moleculeCenters,
        aat: buildAatContext(atomIndex, data),
        sourceBuckets: bucketRanks(nodes.map(sourceBucket)),
        projectionBuckets: bucketRanks(nodes.map(projectionBucket)),
        familyBuckets: bucketRanks(nodes.map((node) => node.atomFamily || "unknown"))
      };
    }

    function buildAatContext(atomIndex, data) {
      const overlays = data.analysisOverlays || {};
      const geometry = data.aatGeometryOverlays || {};
      const gluingGeometry = geometry.gluingGeometry || geometry;
      const axes = Array.isArray(overlays.signatureAxes) ? overlays.signatureAxes : [];
      const obstructions = Array.isArray(overlays.obstructionCircuits) ? overlays.obstructionCircuits : [];
      const findings = overlays.dominantFindings || {};
      const hotspots = Array.isArray(findings.spectrumHotspots) ? findings.spectrumHotspots : [];
      const curvatureItems = geometryItems([
        ...(Array.isArray(geometry.curvatureSupports) ? geometry.curvatureSupports : []),
        ...(Array.isArray(geometry.curvatureTransfers) ? geometry.curvatureTransfers : []),
        ...(Array.isArray(geometry.localCurvatureDiagrams) ? geometry.localCurvatureDiagrams : [])
      ]);
      const holonomyItems = geometryItems([
        ...(Array.isArray(geometry.pathPairs) ? geometry.pathPairs : []),
        ...(Array.isArray(geometry.loops) ? geometry.loops : []),
        ...(Array.isArray(geometry.holonomyReadings) ? geometry.holonomyReadings : []),
        ...(Array.isArray(geometry.stokesReadings) ? geometry.stokesReadings : []),
        ...(Array.isArray(geometry.pathHomotopyDiagrams) ? geometry.pathHomotopyDiagrams : [])
      ]);
      const obstructionLoopItems = geometryItems([
        ...obstructions,
        ...(Array.isArray(geometry.localCurvatureDiagrams) ? geometry.localCurvatureDiagrams : []),
        ...(Array.isArray(geometry.nonzeroMonodromyWitnesses) ? geometry.nonzeroMonodromyWitnesses : [])
      ]);
      const spectrumItems = geometryItems([
        ...hotspots,
        ...flattenReportItems(geometry.spectrumReport),
        ...(Array.isArray(geometry.curvatureTransfers) ? geometry.curvatureTransfers : [])
      ]);
      const viewerDistanceItems = Array.isArray(geometry.viewerDistanceInputs)
        ? geometry.viewerDistanceInputs
        : [];
      const atomToAxes = new Map();
      const atomToObstructions = new Map();
      const atomToCurvature = new Map();
      const atomToHolonomy = new Map();
      const atomToObstructionLoops = new Map();
      const atomToSpectrum = new Map();
      const atomToViewerDistances = new Map();
      const viewerDistances = [];
      const axisByRef = new Map();
      const axisCenters = new Map();
      const obstructionCenters = new Map();
      const hotspotByAxis = new Map();

      axes.forEach((axis, index) => {
        const keys = axisKeys(axis);
        const center = groupPosition(index, Math.max(axes.length, 1), 62);
        keys.forEach((key) => {
          axisByRef.set(key, { axis, index, center });
          axisCenters.set(key, center);
        });
        atomRefs(axis).forEach((atomRef) => {
          if (!atomIndex.has(atomRef)) return;
          if (!atomToAxes.has(atomRef)) atomToAxes.set(atomRef, []);
          atomToAxes.get(atomRef).push({ axis, index, center });
        });
      });

      obstructions.forEach((obstruction, index) => {
        const center = groupPosition(index, Math.max(obstructions.length, 1), 78);
        obstructionCenters.set(obstruction.obstructionCircuitId || obstruction.ref || `obstruction:${index}`, center);
        atomRefs(obstruction).forEach((atomRef) => {
          if (!atomIndex.has(atomRef)) return;
          if (!atomToObstructions.has(atomRef)) atomToObstructions.set(atomRef, []);
          atomToObstructions.get(atomRef).push({ obstruction, index, center });
        });
      });

      hotspots.forEach((hotspot, index) => {
        if (!hotspot.axisRef) return;
        hotspotByAxis.set(hotspot.axisRef, { hotspot, index });
      });

      indexGeometryItems(curvatureItems, atomIndex, atomToCurvature, 66);
      indexGeometryItems(holonomyItems, atomIndex, atomToHolonomy, 86);
      indexGeometryItems(obstructionLoopItems, atomIndex, atomToObstructionLoops, 92);
      indexGeometryItems(spectrumItems, atomIndex, atomToSpectrum, 74);
      viewerDistanceItems.forEach((item, index) => {
        if (!item || typeof item !== "object") return;
        const source = String(item.sourceRef || "");
        const target = String(item.targetRef || "");
        if (!atomIndex.has(source) || !atomIndex.has(target)) return;
        const rawValue = Number(item.distanceValue);
        const record = {
          item,
          index,
          source,
          target,
          value: Number.isFinite(rawValue) ? Math.max(rawValue, 0) : null,
          moleculeRef: String(item.generatedMoleculeRef || ""),
          coordinateComponents: Array.isArray(item.coordinateComponents) ? item.coordinateComponents.map(String) : []
        };
        viewerDistances.push(record);
        [source, target].forEach((atomRef) => {
          if (!atomToViewerDistances.has(atomRef)) atomToViewerDistances.set(atomRef, []);
          atomToViewerDistances.get(atomRef).push(record);
        });
      });

      return {
        geometry,
        axes,
        obstructions,
        hotspots,
        curvatureItems,
        holonomyItems,
        obstructionLoopItems,
        spectrumItems,
        atomToAxes,
        atomToObstructions,
        atomToCurvature,
        atomToHolonomy,
        atomToObstructionLoops,
        atomToSpectrum,
        atomToViewerDistances,
        viewerDistances,
        gluingGeometry,
        atomGlyphByRef: new Map((Array.isArray(gluingGeometry.atomGlyphs) ? gluingGeometry.atomGlyphs : []).map((glyph) => [String(glyph.atomRef || ""), glyph])),
        axisByRef,
        axisCenters,
        obstructionCenters,
        hotspotByAxis
      };
    }

    function axisKeys(axis) {
      return [axis.axisRef, axis.signatureAxisId, axis.ref, axis.lawRef].filter(Boolean).map(String);
    }

    function atomRefs(item) {
      const refs = [];
      collectAtomRefs(item, refs);
      return [...new Set(refs)];
    }

    function collectAtomRefs(value, refs) {
      if (typeof value === "string") {
        if (value.startsWith("atom:")) refs.push(value);
        return;
      }
      if (Array.isArray(value)) {
        value.forEach((item) => collectAtomRefs(item, refs));
        return;
      }
      if (!value || typeof value !== "object") return;
      Object.values(value).forEach((item) => collectAtomRefs(item, refs));
    }

    function geometryItems(items) {
      return items.flatMap((item) => flattenGeometryItem(item)).filter((item) => atomRefs(item).length);
    }

    function flattenGeometryItem(item) {
      if (!item || typeof item !== "object") return [];
      const nestedKeys = [
        "topCurvatureModes",
        "witnessSupports",
        "witnessClusters",
        "transferEdges",
        "topHotspots",
        "topEigenmodes",
        "recurrentObstructions",
        "pathPairs",
        "loopCandidates",
        "readings"
      ];
      const nested = nestedKeys.flatMap((key) => Array.isArray(item[key])
        ? item[key].map((child) => ({ ...child, parentKind: item.kind || item.readingKind || key }))
        : []);
      return [item, ...nested];
    }

    function indexGeometryItems(items, atomIndex, target, scale) {
      items.forEach((item, index) => {
        const center = groupPosition(index, Math.max(items.length, 1), scale);
        atomRefs(item).forEach((atomRef) => {
          if (!atomIndex.has(atomRef)) return;
          if (!target.has(atomRef)) target.set(atomRef, []);
          target.get(atomRef).push({ item, index, center, value: geometryValue(item) });
        });
      });
    }

    function geometryValue(item) {
      for (const key of ["curvatureValue", "value", "score", "defectValue", "cycleWeight", "coverageGapCount", "refCount", "sourceRefCount"]) {
        const value = Number(item?.[key]);
        if (Number.isFinite(value)) return value;
      }
      const refs = atomRefs(item);
      return refs.length ? Math.min(refs.length, 60) / 10 : 0;
    }

    function geometryMemberships(node, layoutContext) {
      const aat = layoutContext.aat;
      return {
        axes: aat.atomToAxes.get(node.nodeId) || [],
        curvature: aat.atomToCurvature.get(node.nodeId) || [],
        holonomy: aat.atomToHolonomy.get(node.nodeId) || [],
        obstructions: aat.atomToObstructionLoops.get(node.nodeId) || [],
        spectrum: aat.atomToSpectrum.get(node.nodeId) || [],
        viewerDistances: aat.atomToViewerDistances.get(node.nodeId) || []
      };
    }

    function aatGeometryBase(node, index, layoutContext, salt) {
      const memberships = geometryMemberships(node, layoutContext);
      const weighted = [
        ...memberships.curvature.map((item) => ({ ...item, weight: 1.45 })),
        ...memberships.holonomy.map((item) => ({ ...item, weight: 1.25 })),
        ...memberships.obstructions.map((item) => ({ ...item, weight: 1.35 })),
        ...memberships.spectrum.map((item) => ({ ...item, weight: 1.1 })),
        ...memberships.axes.map((item) => ({ ...item, value: 0, weight: 0.65 }))
      ];
      if (!weighted.length) return outsideAnalysisPosition(node, index, `${salt}-geometry-boundary`, -86);
      const p = new THREE.Vector3();
      let totalWeight = 0;
      weighted.slice(0, 14).forEach((item) => {
        const value = Math.min(Math.abs(Number(item.value || 0)), 12);
        const weight = item.weight + value * 0.08;
        p.addScaledVector(item.center, weight);
        totalWeight += weight;
      });
      p.divideScalar(Math.max(totalWeight, 1));
      const spread = weighted.length;
      const localAngle = (index + hashText(`${salt}:${node.nodeId}`)) * 2.399963229728653;
      const jitter = 5 + Math.sqrt((index % 233) + 1) * 1.15 + Math.min(spread, 8) * 2.2;
      const familyLift = (familyRank(node.atomFamily) - 4) * 2.1;
      return new THREE.Vector3(p.x + Math.cos(localAngle) * jitter, familyLift, p.z + Math.sin(localAngle) * jitter);
    }

    function geometryScalar(items, fallback = 0) {
      if (!items.length) return fallback;
      return items.reduce((sum, item) => sum + Math.abs(Number(item.value || 0)), 0) / items.length;
    }

    function nodePosition(node, index, total, layoutContext) {
      const mode = viewModeEl.value;
      const familyHash = hashText(node.atomFamily || "atom");
      const family = familyHash % 11;
      const angle = index * 2.399963229728653;
      const radius = mode === "density" ? 18 + Math.sqrt(index + 1) * 2.8 : 22 + Math.sqrt(index + 1) * 6.8;
      if (mode === "molecules") {
        return moleculePosition(node, index, layoutContext);
      }
      if (mode === "aatAxes") {
        return aatAxisPosition(node, index, layoutContext);
      }
      if (mode === "curvature") {
        return curvatureFieldPosition(node, index, layoutContext);
      }
      if (mode === "holonomy") {
        return holonomyPathPosition(node, index, layoutContext);
      }
      if (mode === "obstructionLoops" || mode === "obstructions") {
        return obstructionPosition(node, index, layoutContext);
      }
      if (mode === "flatness") {
        return flatnessPosition(node, index, layoutContext);
      }
      if (mode === "spectrum") {
        return spectrumPosition(node, index, layoutContext);
      }
      if (mode === "sources") {
        return bucketedPosition(sourceBucket(node), index, layoutContext.sourceBuckets, 52, sourceWeight(node));
      }
      if (mode === "projection") {
        return bucketedPosition(projectionBucket(node), index, layoutContext.projectionBuckets, 48, Number(node.projectionRefs?.length || 0));
      }
      if (mode === "evidence") {
        return evidencePosition(node, index, layoutContext);
      }
      if (mode === "risk") {
        const risk = riskScore(node);
        const riskRadius = 28 + risk * 18 + Math.sqrt(index + 1) * 2.5;
        return new THREE.Vector3(Math.cos(angle) * riskRadius, (risk - 2) * 22 + ((index % 5) - 2) * 2, Math.sin(angle) * riskRadius);
      }
      const y = (family - 5) * 12 + ((index % 7) - 3) * 2;
      return new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
    }

    function aatAxisPosition(node, index, layoutContext) {
      const axes = layoutContext.aat.atomToAxes.get(node.nodeId) || [];
      if (!axes.length) return outsideAnalysisPosition(node, index, "axis-none", -82);
      const primary = axes[0];
      const center = axes.length === 1 ? primary.center : centroid(axes.map((item) => item.center));
      const localAngle = (index + primary.index * 17) * 2.399963229728653;
      const support = Math.min(Number(primary.axis.sourceRefs?.length || 0), 6000);
      const localRadius = 10 + Math.sqrt((index % 377) + 1) * 1.8 + axes.length * 4;
      const gapLift = String(primary.axis.coverageStatus || "").includes("gap") ? 24 : 0;
      return new THREE.Vector3(center.x + Math.cos(localAngle) * localRadius, gapLift + axes.length * 9 + support / 420, center.z + Math.sin(localAngle) * localRadius);
    }

    function obstructionPosition(node, index, layoutContext) {
      const memberships = geometryMemberships(node, layoutContext);
      const obstructions = viewModeEl.value === "obstructionLoops"
        ? memberships.obstructions
        : layoutContext.aat.atomToObstructions.get(node.nodeId) || [];
      if (!obstructions.length) return outsideAnalysisPosition(node, index, "obstruction-none", -76);
      const base = viewModeEl.value === "obstructionLoops"
        ? aatGeometryBase(node, index, layoutContext, "obstruction")
        : (() => {
          const primary = obstructions[0];
          const center = obstructions.length === 1 ? primary.center : centroid(obstructions.map((item) => item.center));
          const localAngle = (index + primary.index * 23) * 2.399963229728653;
          const localRadius = 8 + Math.sqrt((index % 233) + 1) * 1.9 + obstructions.length * 5;
          return new THREE.Vector3(center.x + Math.cos(localAngle) * localRadius, 0, center.z + Math.sin(localAngle) * localRadius);
        })();
      const primary = obstructions[0];
      const obstruction = primary.obstruction || primary.item || {};
      const witnessLift = String(obstruction.witnessRuleRef || obstruction.obstructionRef || "").length ? 26 : 12;
      const missing = Array.isArray(obstruction.missingEvidence) ? obstruction.missingEvidence.length : 0;
      const valueLift = Math.min(Math.abs(Number(primary.value || 0)), 8) * 5;
      const phase = ((hashText(node.nodeId) % 360) / 360) * Math.PI * 2;
      const loopRadius = viewModeEl.value === "obstructionLoops" ? 8 + obstructions.length * 4 : 0;
      base.x += Math.cos(phase) * loopRadius;
      base.z += Math.sin(phase) * loopRadius;
      base.y = witnessLift + missing * 2.5 + valueLift + memberships.curvature.length * 5;
      return base;
    }

    function curvatureFieldPosition(node, index, layoutContext) {
      const memberships = geometryMemberships(node, layoutContext);
      const base = aatGeometryBase(node, index, layoutContext, "curvature");
      if (!memberships.curvature.length) return base;
      const magnitude = Math.min(geometryScalar(memberships.curvature), 12);
      const holonomyPull = Math.min(memberships.holonomy.length, 8) * 3.2;
      const obstructionPull = Math.min(memberships.obstructions.length, 8) * 4.4;
      base.y = 8 + magnitude * 12 + memberships.curvature.length * 4 + holonomyPull + obstructionPull;
      const radial = 1 + magnitude * 0.018;
      base.x *= radial;
      base.z *= radial;
      return base;
    }

    function holonomyPathPosition(node, index, layoutContext) {
      const memberships = geometryMemberships(node, layoutContext);
      const base = aatGeometryBase(node, index, layoutContext, "holonomy");
      if (!memberships.holonomy.length) return base;
      const value = Math.min(geometryScalar(memberships.holonomy), 12);
      const loopCount = memberships.holonomy.length;
      const phase = ((hashText(node.nodeId) % 360) / 360) * Math.PI * 2;
      const twist = 10 + Math.min(loopCount, 8) * 3 + value * 1.5;
      base.x += Math.cos(phase) * twist;
      base.z += Math.sin(phase) * twist;
      base.y = 6 + value * 11 + loopCount * 5 + Math.min(memberships.curvature.length, 6) * 4;
      return base;
    }

    function flatnessPosition(node, index, layoutContext) {
      const memberships = geometryMemberships(node, layoutContext);
      const axes = memberships.axes;
      const obstructions = layoutContext.aat.atomToObstructions.get(node.nodeId) || [];
      const curvature = memberships.curvature;
      const holonomy = memberships.holonomy;
      const gapAxes = axes.filter((item) => String(item.axis.coverageStatus || "").includes("gap"));
      const missing = axes.reduce((sum, item) => sum + (Array.isArray(item.axis.missingEvidence) ? item.axis.missingEvidence.length : 0), 0);
      const obstructionWeight = obstructions.length * 18 + curvature.length * 10 + holonomy.length * 7 + memberships.obstructions.length * 9;
      const base = aatGeometryBase(node, index, layoutContext, "flatness");
      const radius = 1 + (gapAxes.length * 18 + obstructionWeight) * 0.006;
      base.x *= radius;
      base.z *= radius;
      base.y = -38 + gapAxes.length * 26 + Math.min(missing, 24) * 2.2 + obstructionWeight;
      return base;
    }

    function spectrumPosition(node, index, layoutContext) {
      const memberships = geometryMemberships(node, layoutContext);
      const spectral = memberships.spectrum;
      if (spectral.length) {
        const base = aatGeometryBase(node, index, layoutContext, "spectrum");
        const score = Math.min(geometryScalar(spectral), 20);
        const phase = Math.sin((hashText(node.nodeId) % 628) / 100);
        base.y = 14 + score * 7 + spectral.length * 6 + phase * 8;
        base.x *= 1 + score * 0.012;
        base.z *= 1 + score * 0.012;
        return base;
      }
      const axes = layoutContext.aat.atomToAxes.get(node.nodeId) || [];
      const hotAxes = axes
        .map((item) => ({ ...item, hotspot: layoutContext.aat.hotspotByAxis.get(item.axis.axisRef) }))
        .filter((item) => item.hotspot);
      if (!hotAxes.length) return outsideAnalysisPosition(node, index, "spectrum-none", -68);
      const primary = hotAxes[0];
      const center = primary.center;
      const score = Number(primary.hotspot.hotspot.score || 0);
      const gapCount = Number(primary.hotspot.hotspot.coverageGapCount || 0);
      const localAngle = (index + primary.hotspot.index * 29) * 2.399963229728653;
      const localRadius = 12 + Math.sqrt((index % 307) + 1) * 2.2 + score * 18;
      return new THREE.Vector3(center.x + Math.cos(localAngle) * localRadius, 20 + score * 24 + gapCount * 4, center.z + Math.sin(localAngle) * localRadius);
    }

    function hasKey(item, needle) {
      const text = JSON.stringify(item || {}).toLowerCase();
      return text.includes(String(needle).toLowerCase());
    }

    function outsideAnalysisPosition(node, index, salt, y) {
      const angle = (index + hashText(salt)) * 2.399963229728653;
      const radius = 115 + Math.sqrt(index + 1) * 2.5;
      return new THREE.Vector3(Math.cos(angle) * radius, y + (familyRank(node.atomFamily) - 4) * 3, Math.sin(angle) * radius);
    }

    function moleculePosition(node, index, layoutContext) {
      const memberships = layoutContext.membership.get(node.nodeId) || [];
      if (!memberships.length) {
        const fallback = bucketedPosition(node.atomFamily || "unassigned", index, layoutContext.familyBuckets, 50, 0);
        fallback.y -= 62;
        return fallback;
      }
      const primary = memberships[0];
      const center = memberships.length === 1 ? primary.center : centroid(memberships.map((item) => item.center));
      const distanceProfile = viewerDistanceProfile(node, memberships, layoutContext);
      if (distanceProfile) {
        const localRadius = 7 +
          Math.min(distanceProfile.meanDistance, 8) * 5.4 +
          Math.sqrt(distanceProfile.count) * 2.6 +
          Math.min(distanceProfile.componentCount, 20) * 0.35;
        const offset = distanceProfile.offset || new THREE.Vector3(
          Math.cos(distanceProfile.angle) * localRadius,
          0,
          Math.sin(distanceProfile.angle) * localRadius
        );
        return new THREE.Vector3(
          center.x + offset.x,
          center.y + offset.y + (familyRank(node.atomFamily) - 4) * 3 + distanceProfile.meanDistance * 4 + memberships.length * 2,
          center.z + offset.z
        );
      }
      const localAngle = (primary.refIndex + hashText(node.nodeId) % 13) * 2.399963229728653;
      const localRadius = 8 + Math.sqrt(primary.refIndex + 1) * 2.3 + Math.min(memberships.length, 4) * 3;
      return new THREE.Vector3(
        center.x + Math.cos(localAngle) * localRadius,
        center.y + (familyRank(node.atomFamily) - 4) * 4 + memberships.length * 3,
        center.z + Math.sin(localAngle) * localRadius
      );
    }

    function viewerDistanceProfile(node, memberships, layoutContext) {
      const inputs = layoutContext.aat.atomToViewerDistances.get(node.nodeId) || [];
      if (!inputs.length) return null;
      const membershipIds = new Set(memberships.map((membership) => String(membership.group?.groupId || "")));
      const local = inputs.filter((input) =>
        !input.moleculeRef ||
        membershipIds.has(input.moleculeRef) ||
        membershipIds.has(input.moleculeRef.replace(/^generated-/, ""))
      );
      const selected = local.length ? local : inputs;
      const values = selected
        .map((input) => Number(input.value))
        .filter((value) => Number.isFinite(value));
      if (!values.length) return null;
      const meanDistance = values.reduce((sum, value) => sum + value, 0) / values.length;
      const componentCount = selected.reduce((sum, input) => sum + input.coordinateComponents.length, 0);
      const signature = selected.slice(0, 10).map((input) => [
        input.source,
        input.target,
        input.value,
        input.coordinateComponents.slice(0, 6).join("|")
      ].join(":")).join(";");
      const offset = viewerDistanceEmbedding(node, selected);
      return {
        count: selected.length,
        meanDistance,
        componentCount,
        angle: ((hashText(`${node.nodeId}:${signature}`) % 6283) / 1000),
        offset
      };
    }

    function viewerDistanceEmbedding(node, selected) {
      const offset = new THREE.Vector3();
      let contribution = 0;
      selected.slice(0, 20).forEach((input) => {
        const direction = input.source === node.nodeId ? -1 : 1;
        input.coordinateComponents.forEach((component) => {
          const delta = componentDelta(component);
          if (!delta) return;
          offset.addScaledVector(componentAxisVector(component), direction * delta);
          contribution += Math.abs(delta);
        });
      });
      if (!contribution || offset.lengthSq() < 0.0001) return null;
      const scale = 8 + Math.min(contribution, 24) * 1.8 + Math.min(selected.length, 16) * 0.9;
      return offset.normalize().multiplyScalar(scale);
    }

    function componentDelta(component) {
      const match = String(component || "").match(/delta=(-?\d+)/);
      return match ? Number(match[1]) : 0;
    }

    function componentAxisVector(component) {
      const key = String(component || "").split(":")[0];
      const vectors = {
        family: new THREE.Vector3(1, 0.2, 0),
        axis: new THREE.Vector3(0, 0.25, 1),
        subject: new THREE.Vector3(-0.8, 0.15, 0.4),
        predicate: new THREE.Vector3(0.45, 0.2, -0.75),
        objectSlotSet: new THREE.Vector3(-0.25, 0.1, -1)
      };
      return (vectors[key] || new THREE.Vector3(0.6, 0.1, 0.6)).normalize();
    }

    function bucketedPosition(key, index, ranks, baseRadius, weight) {
      const rank = ranks.get(key) || 0;
      const bucketCount = Math.max(ranks.size, 1);
      const bucketAngle = rank / bucketCount * Math.PI * 2;
      const centerRadius = 34 + Math.floor(rank / 14) * 64;
      const center = new THREE.Vector3(Math.cos(bucketAngle) * centerRadius, 0, Math.sin(bucketAngle) * centerRadius);
      const localAngle = (index + hashText(key)) * 2.399963229728653;
      const localRadius = 8 + Math.sqrt((hashText(nodeKeySalt(key, index)) % 180) + 1) * 0.75 + Math.min(Number(weight || 0), 20) * 0.45;
      const y = (rank % 9 - 4) * 8 + Math.min(Number(weight || 0), 20) * 1.2;
      return new THREE.Vector3(center.x + Math.cos(localAngle) * (baseRadius + localRadius), y, center.z + Math.sin(localAngle) * (baseRadius + localRadius));
    }

    function evidencePosition(node, index, layoutContext) {
      const priority = Math.min(Math.max(Number(node.priorityScore || 0), 0), 120);
      const sourceRefs = Math.min(Number(node.sourceRefCount || 0), 24);
      const projectionRefs = Math.min(Number(node.projectionRefs?.length || 0), 10);
      const family = familyRank(node.atomFamily);
      const jitter = hashText(node.nodeId || index);
      return new THREE.Vector3(
        (priority - 42) * 3.2 + (jitter % 17 - 8) * 1.2,
        (family - 4) * 13 + projectionRefs * 5,
        (sourceRefs - 5) * 11 + ((jitter >> 4) % 17 - 8) * 1.4
      );
    }

    function groupPosition(index, total, scale = 70) {
      const angle = index * 2.399963229728653;
      const radius = scale + Math.sqrt(index + 1) * 3;
      return new THREE.Vector3(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
    }

    function bucketRanks(values) {
      return [...new Set(values.filter(Boolean).map(String))]
        .sort((left, right) => left.localeCompare(right))
        .reduce((map, value, index) => map.set(value, index), new Map());
    }

    function sourceBucket(node) {
      const ref = Array.isArray(node.sourceRefSamples) ? node.sourceRefSamples[0] : null;
      if (!ref || typeof ref !== "object") return "source:unknown";
      const kind = ref.sourceKind || ref.kind || "source";
      const path = ref.path || ref.artifactPath || ref.sourceRef || ref.ref || "unknown";
      return `${kind}:${String(path).split(/[?#]/)[0]}`;
    }

    function projectionBucket(node) {
      const refs = Array.isArray(node.projectionRefs) ? node.projectionRefs : [];
      if (!refs.length) return "projection:none";
      return String(refs[0]).split(":").slice(0, 3).join(":");
    }

    function sourceWeight(node) {
      return Number(node.sourceRefCount || 0) + Number(node.objectRefCount || 0);
    }

    function familyRank(family) {
      const ordered = [
        "authority",
        "capability",
        "component",
        "contract",
        "contractSpecification",
        "effect",
        "existence",
        "permission",
        "relation",
        "runtime",
        "semantic",
        "state",
        "trust"
      ];
      const index = ordered.indexOf(String(family || ""));
      return index >= 0 ? index : hashText(family || "atom") % ordered.length;
    }

    function nodeKeySalt(key, index) {
      return `${key}:${index}`;
    }

    function centroid(points) {
      const p = new THREE.Vector3();
      points.forEach((point) => p.add(point));
      return p.divideScalar(points.length);
    }

    function nodeRadius(node) {
      const count = Number(node.sourceRefCount || node.objectRefCount || 1);
      const priority = Math.max(0, Number(node.priorityScore || 0));
      return 1.8 + Math.min(count, 12) * 0.18 + Math.min(priority, 60) * 0.018;
    }

    function nodeColor(node) {
      const sceneColor = sceneNodeColor(node);
      if (sceneColor) return sceneColor;
      return colorByFamily[node.atomFamily] || colorByStatus[node.observationStatus] || 0xb087ff;
    }

    function sceneNodeColor(node) {
      const scene = sceneForMode(viewModeEl.value);
      if (!scene || scene.sceneStatus === "not_active_for_packet") return null;
      const refs = scene.primaryRefs || {};
      const atomRefs = new Set(Array.isArray(refs.atomRefs) ? refs.atomRefs.map(String) : []);
      if (!atomRefs.has(String(node.nodeId))) return null;
      const role = scene.visualEncodings?.[0]?.colorRole || "";
      const colors = {
        measured_nonzero: 0xf2c15f,
        measured_zero: 0x64d6be,
        not_computed: 0xff6b6b,
        analytic_reading: 0x73b7ff,
        repair_candidate: 0xb087ff,
        unknown: 0x9fb3c8,
        checked: 0x64d6be
      };
      return colors[role] || 0xf2c15f;
    }

    function currentAatContext() {
      return activeLayoutContext?.aat || buildAatContext(new Map(), currentData || {});
    }

    function paletteColor(hash) {
      const palette = [0x4cc3a7, 0x66a6ff, 0xb087ff, 0xe0b84e, 0xef6767, 0x8bd46e, 0xff8f5a, 0xd8dee9];
      return palette[Math.abs(hash) % palette.length];
    }

    function riskScore(node) {
      const family = String(node.atomFamily || "");
      let score = 0;
      if (["authority", "trust", "permission"].includes(family)) score += 4;
      if (["state", "effect", "contractSpecification"].includes(family)) score += 2;
      if (Number(node.sourceRefCount || 0) >= 4) score += 1;
      if (Number(node.priorityScore || 0) >= 40) score += 1;
      return score;
    }

    function filterNodes(nodes) {
      const family = familyFilterEl.value;
      const statusValue = statusFilterEl.value;
      const moleculeRefs = selectedMoleculeRefs();
      const query = searchEl.value.trim().toLowerCase();
      return nodes.filter((node) => {
        if (moleculeRefs && !moleculeRefs.has(node.nodeId)) return false;
        if (family && node.atomFamily !== family) return false;
        if (statusValue && node.observationStatus !== statusValue) return false;
        if (!query) return true;
        const haystack = [
          node.nodeId,
          node.atomFamily,
          node.subjectRef,
          node.predicate,
          ...(Array.isArray(node.labels) ? node.labels : [])
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function filterGroups(groups) {
      const selected = moleculeFilterEl.value;
      if (!selected) return groups;
      return groups.filter((group) => group.groupId === selected);
    }

    function selectedMoleculeRefs() {
      const selected = moleculeFilterEl.value;
      if (!selected || !currentData) return null;
      const groups = Array.isArray(currentData.moleculeGroups) ? currentData.moleculeGroups : [];
      const group = groups.find((item) => item.groupId === selected);
      if (!group) return null;
      return new Set(Array.isArray(group.atomObservationRefs) ? group.atomObservationRefs : []);
    }

    function populateFilters(data) {
      const nodes = Array.isArray(data.atomNodes) ? data.atomNodes : [];
      const groups = Array.isArray(data.moleculeGroups) ? data.moleculeGroups : [];
      fillSelect(familyFilterEl, "All families", uniqueSorted(nodes.map((node) => node.atomFamily)));
      fillSelect(statusFilterEl, "All statuses", uniqueSorted(nodes.map((node) => node.observationStatus)));
      fillSelectWithOptions(moleculeFilterEl, "All molecules", groups.map((group) => ({
        value: group.groupId,
        label: moleculeLabel(group)
      })));
    }

    function fillSelect(select, label, values) {
      const current = select.value;
      select.innerHTML = `<option value="">${escapeHtml(label)}</option>` +
        values.map((value) => `<option value="${escapeAttr(value)}">${escapeHtml(value)}</option>`).join("");
      select.value = values.includes(current) ? current : "";
    }

    function fillSelectWithOptions(select, label, options) {
      const current = select.value;
      const normalized = options.filter((option) => option.value).map((option) => ({
        value: String(option.value),
        label: String(option.label || option.value)
      }));
      select.innerHTML = `<option value="">${escapeHtml(label)}</option>` +
        normalized.map((option) => `<option value="${escapeAttr(option.value)}">${escapeHtml(option.label)}</option>`).join("");
      select.value = normalized.some((option) => option.value === current) ? current : "";
    }

    function moleculeLabel(group) {
      const refs = Array.isArray(group.atomObservationRefs) ? group.atomObservationRefs.length : 0;
      return `${group.groupId || "molecule"} (${refs})`;
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(Boolean).map(String))].sort((a, b) => a.localeCompare(b));
    }

    function statusText(allNodes, allEdges) {
      const omitted = currentData.omittedDetailCounts || {};
      const omittedText = Number(omitted.atomNodes || 0) > 0 ? `, ${omitted.atomNodes} atoms omitted by projection` : "";
      const modeText = aatModeStatusText();
      const edgeText = renderedEdgeCount === allEdges.length ? `${allEdges.length}` : `${renderedEdgeCount}/${allEdges.length}`;
      status(`${renderedAtoms.length}/${allNodes.length} atoms, ${renderedGroups.length} molecules, ${edgeText} edges${modeText}${omittedText}`);
    }

    function aatModeStatusText() {
      if (!activeLayoutContext) return "";
      const aat = activeLayoutContext.aat;
      if (viewModeEl.value === "aatAxes") {
        return coverGluingStatusText(aat.gluingGeometry);
      }
      if (viewModeEl.value === "curvature") {
        return hodgeFieldStatusText(aat.gluingGeometry);
      }
      if (viewModeEl.value === "holonomy") {
        return coverGluingStatusText(aat.gluingGeometry);
      }
      if (viewModeEl.value === "obstructionLoops" || viewModeEl.value === "obstructions") {
        return viewModeEl.value === "obstructionLoops"
          ? h1MismatchStatusText(aat.gluingGeometry)
          : forbiddenSupportStatusText(aat.gluingGeometry);
      }
      if (viewModeEl.value === "flatness") {
        return hodgeFieldStatusText(aat.gluingGeometry);
      }
      if (viewModeEl.value === "spectrum") {
        const hotAtoms = renderedAtoms.filter((node) => (aat.atomToSpectrum.get(node.nodeId) || []).length || (aat.atomToAxes.get(node.nodeId) || []).some((item) => aat.hotspotByAxis.has(item.axis.axisRef))).length;
        const spectralReadings = aat.spectrumItems.length || aat.hotspots.length;
        return spectralReadings
          ? `, ${hotAtoms} spectrum-support atoms, ${spectralReadings} spectral readings`
          : hodgeFieldStatusText(aat.gluingGeometry);
      }
      if (viewModeEl.value === "molecules") {
        return `, ${aat.atomToViewerDistances.size} distance-positioned atoms, ${aat.viewerDistances.length} AtomShape distance inputs`;
      }
      if (viewModeEl.value === "projection") {
        return repairMorphStatusText(aat.gluingGeometry);
      }
      return "";
    }

    function coverGluingStatusText(gluingGeometry) {
      const nerve = gluingGeometry?.nerve || {};
      const vertices = Array.isArray(nerve.vertices) ? nerve.vertices.length : 0;
      const edges = Array.isArray(nerve.edges) ? nerve.edges.length : 0;
      const triangles = Array.isArray(nerve.triangles) ? nerve.triangles.length : 0;
      const nonzeroEdges = Array.isArray(nerve.edges)
        ? nerve.edges.filter((edge) => Number(edge.value || 0) > 0).length
        : 0;
      return `, ${vertices} cover patches, ${edges} gluing edges, ${triangles} shared faces, ${nonzeroEdges} nonzero gluing edges`;
    }

    function hodgeFieldStatusText(gluingGeometry) {
      const field = gluingGeometry?.locusField || {};
      const rows = Array.isArray(field.fieldRows) ? field.fieldRows.length : 0;
      const measuredZero = Array.isArray(field.measuredZeroRegions) ? field.measuredZeroRegions.length : 0;
      const blocked = Array.isArray(field.blockedRegions) ? field.blockedRegions.length : 0;
      return `, ${rows} field rows, ${measuredZero} measured-zero regions, ${blocked} blocked regions`;
    }

    function h1MismatchStatusText(gluingGeometry) {
      const ribbon = gluingGeometry?.cocycleRibbon || {};
      const supportEdges = Array.isArray(ribbon.supportEdges) ? ribbon.supportEdges.length : 0;
      const markers = Array.isArray(ribbon.markers) ? ribbon.markers.length : 0;
      const closureVisible = ribbon.closureGapEncoding?.visible ? 1 : 0;
      return `, ${supportEdges} H1 mismatch support edges, ${markers + closureVisible} closure markers`;
    }

    function forbiddenSupportStatusText(gluingGeometry) {
      const cages = Array.isArray(gluingGeometry?.forbiddenCages) ? gluingGeometry.forbiddenCages.length : 0;
      return `, ${cages} forbidden support cages`;
    }

    function repairMorphStatusText(gluingGeometry) {
      const morphs = Array.isArray(gluingGeometry?.repairMorphs) ? gluingGeometry.repairMorphs.length : 0;
      return `, ${morphs} repair morphs`;
    }

    function renderLegend() {
      if (viewModeEl.value === "holonomy" || viewModeEl.value === "aatAxes") {
        renderSimpleLegend([
          ["64d6be", "context patch"],
          ["d8dee9", "selected cover gluing edge"],
          ["73b7ff", "shared cover face"],
          ["f2c15f", "b1 graph cycle reading, not H1 verdict"],
          ["f2c15f", "nonzero gluing edge"]
        ]);
        return;
      }
      if (["curvature", "flatness", "spectrum"].includes(viewModeEl.value)) {
        renderSimpleLegend([
          ["64d6be", "measured-zero basin"],
          ["f2c15f", "signed curvature measured cell"],
          ["73b7ff", "negative curvature valley"],
          ["8a94a3", "blocked torn hole"],
          ["9fb3c8", "IDW membrane is a projection window, not between-cell measurement"]
        ]);
        return;
      }
      if (viewModeEl.value === "obstructionLoops") {
        renderSimpleLegend([
          ["f2c15f", "H1 support ribbon"],
          ["f2c15f", "measured closure marker"],
          ["9fb3c8", "edge.value is mismatch parity, not continuous cohomology magnitude"]
        ]);
        return;
      }
      if (viewModeEl.value === "obstructions") {
        renderSimpleLegend([
          ["ff9468", "forbidden support cage"],
          ["d8dee9", "support edge"]
        ]);
        return;
      }
      if (viewModeEl.value === "projection") {
        renderSimpleLegend([
          ["b087ff", "repair morph"],
          ["d8dee9", "candidate target"]
        ]);
        return;
      }
      if (usesFamilyLegend(viewModeEl.value)) {
        renderFamilyLegend();
        return;
      }
      const scene = sceneForMode(viewModeEl.value);
      const sceneLegend = Array.isArray(scene?.visualEncodingLegend) ? scene.visualEncodingLegend : [];
      if (sceneLegend.length) {
        legendEl.innerHTML = sceneLegend.slice(0, 8).map((item) =>
          `<span class="legend-item"><span class="swatch" style="background:#${legendSwatchColor(item.channel)}"></span>${escapeHtml(item.channel || "encoding")}: ${escapeHtml(item.meaning || "")} ${escapeHtml(legendValueText(item.values))}</span>`
        ).join("");
        return;
      }
      const items = Object.entries(colorByFamily);
      legendEl.innerHTML = items.slice(0, 12).map(([label, color]) =>
        `<span class="legend-item"><span class="swatch" style="background:#${Number(color).toString(16).padStart(6, "0")}"></span>${escapeHtml(label)}</span>`
      ).join("");
    }

    function renderSimpleLegend(items) {
      legendEl.innerHTML = items.map(([color, label]) =>
        `<span class="legend-item"><span class="swatch" style="background:#${color}"></span>${escapeHtml(label)}</span>`
      ).join("");
    }

    function usesFamilyLegend(mode) {
      return ["families", "density", "evidence", "molecules"].includes(mode);
    }

    function renderFamilyLegend() {
      const families = uniqueSorted(renderedAtoms.map((node) => node.atomFamily || "unknown"));
      legendEl.innerHTML = families.slice(0, 12).map((label) => {
        const color = colorByFamily[label] || 0xb087ff;
        return `<span class="legend-item"><span class="swatch" style="background:#${Number(color).toString(16).padStart(6, "0")}"></span>${escapeHtml(label)}</span>`;
      }).join("");
    }

    function legendSwatchColor(channel) {
      const colors = {
        color: "f2c15f",
        shape: "73b7ff",
        line: "d8dee9",
        opacity: "8bd46e",
        thickness: "b087ff"
      };
      return colors[channel] || "9fb3c8";
    }

    function legendValueText(values) {
      if (!values || typeof values !== "object") return "";
      return Object.entries(values).slice(0, 5).map(([key, value]) =>
        `${key}=${value}`
      ).join("; ");
    }

    function renderAxisHud() {
      const layout = axisHudText(viewModeEl.value);
      axisHudEl.innerHTML = `<strong>${escapeHtml(layout.title)}</strong>` +
        ["x", "y", "z"].map((axis) =>
          `<div><b>${axis.toUpperCase()}</b><span>${escapeHtml(layout[axis])}</span></div>`
        ).join("") +
        `<div><b>NOTE</b><span>Coordinates are a visual projection, not semantic distance, causality, or equivalence.</span></div>`;
    }

    function axisHudText(mode) {
      const scene = sceneForMode(mode);
      if (scene && scene.axisMapping) {
        return {
          title: scene.title || scene.sceneId || "Insight scene",
          x: scene.axisMapping.x || "scene x axis",
          y: scene.axisMapping.y || "scene y axis",
          z: scene.axisMapping.z || "scene z axis"
        };
      }
      const layouts = {
        families: {
          title: "Family spiral",
          x: "spiral radius",
          y: "atom family band",
          z: "spiral phase"
        },
        curvature: {
          title: "Curvature field",
          x: "AAT geometry support",
          y: "curvature value / shared pressure",
          z: "AAT geometry support"
        },
        holonomy: {
          title: "Cover & Gluing",
          x: "context neighborhood",
          y: "restriction depth",
          z: "gluing mismatch intensity"
        },
        obstructionLoops: {
          title: "Obstruction loops",
          x: "cycle support + atom phase",
          y: "witness / defect lift",
          z: "cycle support + atom phase"
        },
        flatness: {
          title: "Flatness surface",
          x: "AAT geometry support spread",
          y: "non-flatness pressure",
          z: "AAT geometry support spread"
        },
        spectrum: {
          title: "Spectrum landscape",
          x: "spectral support",
          y: "spectral value + wave phase",
          z: "spectral support"
        },
        aatAxes: {
          title: "Site / Cover",
          x: "source neighborhood",
          y: "poset rank",
          z: "coverage density or context size"
        },
        molecules: {
          title: "Molecule map",
          x: "AtomShape distance from molecule center",
          y: "atom family + mean distance",
          z: "AtomShape distance from molecule center"
        },
        sources: {
          title: "Source map",
          x: "source bucket",
          y: "source weight",
          z: "source bucket"
        },
        projection: {
          title: "Projection map",
          x: "projection ref bucket",
          y: "projection count",
          z: "projection ref bucket"
        },
        evidence: {
          title: "Evidence map",
          x: "priority score",
          y: "atom family + projection refs",
          z: "source refs"
        },
        risk: {
          title: "Boundary review",
          x: "boundary score radius",
          y: "boundary score",
          z: "boundary score radius"
        },
        density: {
          title: "Density",
          x: "compact source-density spiral",
          y: "atom family band",
          z: "compact source-density spiral"
        }
      };
      return layouts[mode] || layouts.families;
    }

    function sceneForMode(mode) {
      const scenes = Array.isArray(currentData?.viewerVisualScenes) ? currentData.viewerVisualScenes : [];
      const mapping = {
        families: "overview",
        aatAxes: "site-cover",
        holonomy: "cech-gluing",
        obstructionLoops: "cech-h1-mismatch",
        obstructions: "obstruction",
        projection: "repair-dual",
        risk: "boundary-assumption",
        sources: "source-evidence",
        curvature: "hodge-debt-field",
        flatness: "hodge-debt-field",
        spectrum: "hodge-debt-field",
        analyticOverlay: "analytic-overlay"
      };
      const sceneId = mapping[mode] || mode;
      return scenes.find((scene) => scene.sceneId === sceneId || scene.kind === sceneId);
    }

    function modeForScene(sceneId) {
      const mapping = {
        overview: "families",
        "site-cover": "aatAxes",
        "cech-gluing": "holonomy",
        "cech-h1-mismatch": "obstructionLoops",
        obstruction: "obstructions",
        "repair-dual": "projection",
        "law-conflict-tor": "risk",
        "hodge-debt-field": "curvature",
        "analytic-overlay": "analyticOverlay",
        "boundary-assumption": "risk",
        "source-evidence": "sources"
      };
      return mapping[sceneId] || "families";
    }

    function hashText(text) {
      text = String(text);
      let hash = 0;
      for (let i = 0; i < text.length; i += 1) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
      return Math.abs(hash);
    }

    function flattenReportItems(value) {
      if (Array.isArray(value)) return value;
      if (!value || typeof value !== "object") return [];
      return Object.entries(value).flatMap(([kind, items]) => {
        const array = Array.isArray(items) ? items : [items];
        return array.filter((item) => item && typeof item === "object").map((item) => ({ kind, ...item }));
      });
    }

    function updateVisibility() {
      atomGroup.visible = toggles.atoms.checked;
      moleculeGroup.visible = toggles.groups.checked;
      edgeGroup.visible = toggles.edges.checked;
    }

    Object.values(toggles).forEach((input) => input.addEventListener("change", updateVisibility));
    viewModeEl.addEventListener("change", handleViewModeChange);
    [familyFilterEl, statusFilterEl, moleculeFilterEl].forEach((input) => input.addEventListener("change", renderScene));
    const debouncedRenderScene = debounce(renderScene, 90);
    searchEl.addEventListener("input", debouncedRenderScene);
    searchEl.addEventListener("search", debouncedRenderScene);
    searchEl.addEventListener("change", debouncedRenderScene);
    resetEl.addEventListener("click", resetCamera);
    reportToggleEl.addEventListener("click", toggleReport);
    reportEl.addEventListener("click", handleReportAction);
    detailEl.addEventListener("click", handleTourStepAction);
    renderer.domElement.addEventListener("pointerdown", selectVisual);

    fileEl.addEventListener("change", async (event) => {
      const file = event.target.files?.[0];
      if (!file) return;
      await loadUserFile(file);
    });

    window.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropEl.classList.add("active");
    });
    window.addEventListener("dragleave", () => dropEl.classList.remove("active"));
    window.addEventListener("drop", async (event) => {
      event.preventDefault();
      dropEl.classList.remove("active");
      const file = event.dataTransfer?.files?.[0];
      if (!file) return;
      await loadUserFile(file);
    });

    async function loadUserFile(file) {
      try {
        const data = JSON.parse(await file.text());
        renderData(data, file.name, await loadCompanionReports());
      } catch (error) {
        status(`Could not load ${file.name}: ${error.message}`);
      }
    }

    function debounce(fn, wait) {
      let timer = 0;
      return () => {
        window.clearTimeout(timer);
        timer = window.setTimeout(fn, wait);
      };
    }

    function toggleReport() {
      setReportOpen(!appEl.classList.contains("report-open"));
    }

    function setReportOpen(isOpen) {
      appEl.classList.toggle("report-open", isOpen);
      reportToggleEl.textContent = isOpen ? "Hide report" : "Show report";
      reportToggleEl.setAttribute("aria-expanded", String(isOpen));
      window.setTimeout(resize, 190);
    }

    function selectVisual(event) {
      if (!currentData) return;
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / Math.max(rect.width, 1)) * 2 - 1;
      pointer.y = -(((event.clientY - rect.top) / Math.max(rect.height, 1)) * 2 - 1);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects([atomInstanceMesh].filter(Boolean), false);
      if (hits.length && hits[0].object === atomInstanceMesh) {
        const hit = hits[0];
        const node = renderedAtoms[hit.instanceId];
        selectedAtomKey = node?.nodeId || null;
        renderDetail("Atom", node);
        return;
      }
      const selectableSceneObjects = edgeGroup.children.filter((child) =>
        child.userData?.kind === "sceneLayer" || child.userData?.kind === "sceneLayerRefs"
      );
      const sceneHits = raycaster.intersectObjects(selectableSceneObjects, true)
        .filter((hit) => hit.object?.userData?.kind === "sceneLayer" || hit.object?.userData?.kind === "sceneLayerRefs");
      if (sceneHits.length) {
        const { scene, layer, encoding } = sceneHits[0].object.userData;
        renderDetail("Scene", sceneDetailItem(scene, layer, encoding));
        return;
      }
      detailEl.hidden = true;
      selectedAtomKey = null;
    }

    function renderDetail(kind, item) {
      if (!item) return;
      const sourceRefs = Array.isArray(item.sourceRefSamples) ? item.sourceRefSamples : [];
      const detailRefs = Array.isArray(item.detailRefs) ? item.detailRefs : Array.isArray(item.packetRefs) ? item.packetRefs : [];
      const labels = Array.isArray(item.labels) ? item.labels : [];
      const rows = [
        item.what && `What: ${item.what}`,
        item.whyItMatters && `Why: ${item.whyItMatters}`,
        item.nodeId || item.groupId || item.ref || item.axisRef || item.lawRef,
        item.atomFamily && `family: ${item.atomFamily}`,
        item.observationStatus && `status: ${item.observationStatus}`,
        item.confidence && `confidence: ${item.confidence}`,
        item.subjectRef && `subject: ${item.subjectRef}`,
        item.predicate && `predicate: ${item.predicate}`,
        item.conclusion && `conclusion: ${item.conclusion}`,
        item.recommendedAction && `next: ${item.recommendedAction}`,
        item.recommendedNextAction && `next: ${item.recommendedNextAction}`,
        item.nextAction?.label && `Next: ${item.nextAction.label}`,
        item.evidence && `Measurement: ${compactJson(item.evidence)}`,
        item.boundaryDigest && `Boundary: ${compactJson(item.boundaryDigest)}`,
        Array.isArray(item.nonClaims) && item.nonClaims.length && `Boundary: ${item.nonClaims.join("; ")}`,
        labels.length && `labels: ${labels.join(", ")}`,
        sourceRefs.length && `source refs: ${sourceRefs.map(sourceRefLabel).join(", ")}`,
        detailRefs.length && `detail refs: ${detailRefs.join(", ")}`
      ].filter(Boolean);
      detailEl.innerHTML = `<h2>${escapeHtml(kind)}</h2>${rows.map((row) => `<p>${escapeHtml(String(row))}</p>`).join("")}`;
      detailEl.hidden = false;
    }

    function sceneDetailItem(scene, layer = {}, encoding = {}) {
      const refs = layer.refs || scene.primaryRefs || {};
      return {
        what: scene.userQuestion,
        conclusion: scene.sceneStatus,
        recommendedNextAction: scene.title,
        boundaryDigest: scene.boundaryDigestRef,
        nonClaims: scene.nonClaims,
        labels: [
          scene.sceneId,
          layer.kind,
          layer.boundaryState && `boundary:${layer.boundaryState}`,
          encoding.colorRole && `color:${encoding.colorRole}`,
          encoding.shapeRole && `shape:${encoding.shapeRole}`,
          encoding.lineRole && `line:${encoding.lineRole}`,
          encoding.textRole && `text:${encoding.textRole}`
        ].filter(Boolean),
        detailRefs: [
          ...(Array.isArray(refs.insightRefs) ? refs.insightRefs : []),
          ...(Array.isArray(refs.atomRefs) ? refs.atomRefs.slice(0, 4) : []),
          ...(Array.isArray(refs.contextRefs) ? refs.contextRefs.slice(0, 4) : [])
        ]
      };
    }

    async function handleReportAction(event) {
      const button = event.target.closest("[data-tour-id], [data-scene-id], [data-copy-source-refs]");
      if (!button) return;
      event.preventDefault();
      if (button.dataset.tourId) {
        startGuidedTour(button.dataset.tourId);
        return;
      }
      if (button.dataset.sceneId) {
        viewModeEl.value = modeForScene(button.dataset.sceneId);
        handleViewModeChange();
        const scene = (currentData?.viewerVisualScenes || []).find((item) => item.sceneId === button.dataset.sceneId);
        if (scene) renderDetail("Scene", sceneDetailItem(scene, scene.layers?.[0], scene.visualEncodings?.[0]));
        status(`Scene: ${button.dataset.sceneId}`);
        return;
      }
      if (button.dataset.copySourceRefs) {
        await copyText(button.dataset.copySourceRefs);
      }
    }

    function startGuidedTour(tourId) {
      const tours = Array.isArray(currentData?.guidedTours) ? currentData.guidedTours : [];
      const tour = tours.find((item) => item.tourId === tourId);
      if (!tour || !Array.isArray(tour.steps) || !tour.steps.length) {
        status(`Tour not found: ${tourId}`);
        return;
      }
      setReportOpen(false);
      activeTourState = { tour, stepIndex: 0 };
      showTourStep();
    }

    function showTourStep() {
      if (!activeTourState) return;
      const { tour, stepIndex } = activeTourState;
      if (stepIndex < 0 || stepIndex >= tour.steps.length) {
        activeTourState = null;
        detailEl.hidden = true;
        status("Tour complete");
        return;
      }
      const step = tour.steps[stepIndex];
      viewModeEl.value = modeForScene(step.sceneId);
      handleViewModeChange();
      const nextButton = stepIndex + 1 < tour.steps.length
        ? `<button type="button" data-tour-next="true">Next</button>`
        : `<button type="button" data-tour-end="true">Done</button>`;
      detailEl.innerHTML = `<h2>${escapeHtml(tour.title || tour.tourId)}</h2><p>${escapeHtml(step.caption || step.sceneId)}</p><p>${escapeHtml(compactJson(step.highlightRefs || {}))}</p><div class="chips">${nextButton}</div>`;
      detailEl.hidden = false;
      status(`Tour ${stepIndex + 1}/${tour.steps.length}: ${step.sceneId}`);
    }

    function handleTourStepAction(event) {
      const next = event.target.closest("[data-tour-next]");
      const end = event.target.closest("[data-tour-end]");
      if (next && activeTourState) {
        event.preventDefault();
        activeTourState.stepIndex += 1;
        showTourStep();
        return;
      }
      if (end) {
        event.preventDefault();
        activeTourState = null;
        detailEl.hidden = true;
        status("Tour complete");
      }
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        status("Copied source refs");
      } catch (_error) {
        setReportOpen(false);
        detailEl.innerHTML = `<h2>Copy source refs</h2><p>${escapeHtml(text)}</p>`;
        detailEl.hidden = false;
        status("Source refs shown in detail panel");
      }
    }

    function sourceRefLabel(ref) {
      if (!ref || typeof ref !== "object") return String(ref);
      return [ref.sourceKind, ref.path, ref.symbol, ref.ref].filter(Boolean).join(":") || JSON.stringify(ref);
    }

    function renderReport(data, companions = {}) {
      const report = data.reportPane || {};
      const summary = companions.summary || {};
      const manifest = companions.manifest || {};
      const overview = report.overview || {};
      const verdict = overview.summaryVerdict || summary.verdict || {};
      const validation = overview.validation || summary.validation || manifest.validationResultSummary || {};
      const decisionBar = data.decisionBar || report.decisionBar || {};
      const evidenceDetailShape = report.evidenceDetailShape || [];
      const insightQueue = report.insightQueue || data.insightQueue || summary.insightCards || report.topFindings || summary.dominantFindings || data.analysisOverlays?.dominantFindings;
      const actionQueue = report.actionQueue || data.actionQueue || summary.actionQueue || data.analysisOverlays?.actionQueue;

      document.getElementById("report-title").textContent =
        decisionBar.conclusion || overview.architectureId || overview.mapId || "ArchSig Atom Viewer";
      document.getElementById("metric-atoms").textContent = count(data.atomNodes);
      document.getElementById("metric-groups").textContent = count(data.moleculeGroups);
      document.getElementById("metric-edges").textContent = count(data.atomEdges);
      document.getElementById("metric-verdict").innerHTML = verdictBadge(verdict);
      document.getElementById("metric-validation").innerHTML = validationBadge(validation);

      renderOverview(overview, verdict, summary, data.nonConclusions || [], decisionBar, report.readThisFirst || summary.readThisFirst);
      renderItems("findings", insightQueue, "insight");
      renderDistanceDiagnosis(report.distanceDiagnosis || summary.distanceDiagnosis || data.aatGeometryOverlays?.diagnosticDistanceReadings);
      renderItems("actions", actionQueue, "action");
      renderCoverage(report.coverageAndBoundaries || report.boundaryDigest || {}, verdict, summary);
      renderArtifacts(report.artifacts || report.artifactLinks || decisionBar.artifactLinks || {}, data.sourceArtifactRefs || {}, manifest);
      renderValidationStatus(validation);
      const geometryCounts = data.aatGeometryOverlays?.omittedGeometryCounts
        || data.aatGeometryOverlays?.gluingGeometry?.omittedGeometryCounts
        || {};
      renderOmitted(data.omittedDetailCounts || {}, data.truncationPolicy || {}, geometryCounts);
    }

    function count(value) {
      return Array.isArray(value) ? String(value.length) : "0";
    }

    function validationBadge(validation) {
      const values = [];
      for (const [key, value] of Object.entries(validation || {})) {
        if (value && typeof value === "object" && "result" in value) values.push(`${key}:${value.result}`);
      }
      const result = values.join(" ");
      const klass = result.includes("fail") ? "fail" : result.includes("warn") ? "warn" : "ok";
      return `<span class="${klass}">${escapeHtml(result || "-")}</span>`;
    }

    function verdictBadge(verdict) {
      const value = verdict.qualityState || verdict.flatness || verdict.readingMode || "-";
      const klass = String(value).includes("fail") || String(value).includes("blocked") ? "fail"
        : String(value).includes("warn") || String(value).includes("gap") ? "warn"
          : "ok";
      return `<span class="${klass}">${escapeHtml(String(value))}</span>`;
    }

    function renderOverview(overview, verdict, summary, nonConclusions, decisionBar = {}, readThisFirst = {}) {
      const root = document.getElementById("overview");
      const rows = [
        decisionBar.conclusion && ["Decision Bar", decisionBar.conclusion],
        decisionBar.boundaryDigest && ["boundary digest", decisionBar.boundaryDigest],
        readThisFirst.whatItMeans && ["Read this first", readThisFirst.whatItMeans],
        readThisFirst.nextAction && ["next action", readThisFirst.nextAction],
        overview.mapId && ["archmap", overview.mapId],
        overview.analysisId && ["analysis", overview.analysisId],
        verdict.readingMode && ["reading mode", verdict.readingMode],
        verdict.flatness && ["flatness", verdict.flatness],
        verdict.qualityState && ["quality", verdict.qualityState],
        (overview.measurementStatusSummary || summary.measurementStatusSummary) && ["measurement", compactJson(overview.measurementStatusSummary || summary.measurementStatusSummary)],
        Array.isArray(nonConclusions) && nonConclusions.length && ["non-conclusion", nonConclusions[0]]
      ].filter(Boolean);
      root.innerHTML = rows.length
        ? rows.map(([label, value]) => `<div class="item"><strong>${escapeHtml(String(label))}</strong><p>${escapeHtml(String(value))}</p></div>`).join("")
        : emptyItem();
    }

    function renderItems(id, value, fallbackLabel) {
      const root = document.getElementById(id);
      const items = flattenReportItems(value).slice(0, 12);
      root.innerHTML = items.length ? items.map((item, index) => itemHtml(item, fallbackLabel, index)).join("") : emptyItem();
    }

    function renderDistanceDiagnosis(value) {
      const root = document.getElementById("distance-diagnosis");
      if (!value || typeof value !== "object" || Array.isArray(value)) {
        renderItems("distance-diagnosis", value, "distance");
        return;
      }
      const status = value.distanceStatusSummary || {};
      const measuredMovement = value.measuredMovement || {};
      const blocks = [
        ["verdict", value.verdict],
        ["profile", value.distanceProfileRef],
        ["status", compactStatusSummary(status)],
        ["movement", compactDistanceValues(measuredMovement, ["totalMeasuredDistance", "pathDrift", "endpointDistance"])],
        ["safe margin", distanceValueText(value.safeMargin)],
        ["unmeasured axes", Array.isArray(value.unmeasuredAxes) && value.unmeasuredAxes.length ? value.unmeasuredAxes.join(", ") : "none"],
        ["repair", compactDistanceValues(value.repairDistance, ["operationCost", "targetDistanceDecrease", "sideEffectBound"])],
        ["curvature", compactDistanceValues(value.curvatureDistance, ["curvatureMass", "transportDistance"])],
        ["homotopy", compactDistanceValues(value.homotopyDistance, ["homotopyDistance", "fillingCost", "observationGapLowerBound"])],
        ["representation", compactRepresentationMetricValues(value.representationMetric)],
        ["boundary", value.distanceBoundary],
        ["non-claims", Array.isArray(value.nonClaims) ? value.nonClaims.join("; ") : null],
        ["detail refs", Array.isArray(value.detailRefs) ? value.detailRefs.join(", ") : null]
      ].filter(([, text]) => text != null && text !== "");
      root.innerHTML = blocks.length
        ? blocks.map(([label, text]) => `<div class="item"><strong>${escapeHtml(String(label))}</strong><p>${escapeHtml(String(text))}</p></div>`).join("")
        : emptyItem();
    }

    function compactStatusSummary(summary) {
      const parts = [
        summary.measuredCount != null && `measured: ${summary.measuredCount}`,
        summary.zeroCount != null && `zero: ${summary.zeroCount}`,
        summary.blockedCount != null && `blocked: ${summary.blockedCount}`,
        summary.unmeasuredCount != null && `unmeasured: ${summary.unmeasuredCount}`,
        summary.schemaFoundationOnlyCount != null && `schema-only: ${summary.schemaFoundationOnlyCount}`
      ].filter(Boolean);
      return parts.join(", ") || null;
    }

    function compactDistanceValues(container, keys) {
      if (!container || typeof container !== "object") return null;
      const refs = [
        container.readingId && `reading: ${container.readingId}`,
        container.operationDeltaRef && `operation: ${container.operationDeltaRef}`,
        container.operationRef && !container.operationDeltaRef && `operation: ${container.operationRef}`,
        container.profileRef && `profile: ${container.profileRef}`,
        container.supportReadingRef && `support: ${container.supportReadingRef}`
      ].filter(Boolean);
      const values = keys.map((key) => {
        const text = distanceValueText(container[key]);
        return text ? `${key}: ${text}` : null;
      }).filter(Boolean);
      return [...refs, ...values].join("; ") || null;
    }

    function distanceValueText(value) {
      if (!value || typeof value !== "object") return null;
      const status = value.status || "unknown";
      const measured = value.measuredValue == null ? "n/a" : value.measuredValue;
      const unit = value.unit || "";
      const blockers = value.blockerRefCount != null ? ` blockers=${value.blockerRefCount}` : "";
      return `${status} ${measured}${unit ? ` ${unit}` : ""}${blockers}`;
    }

    function compactRepresentationMetricValues(metrics) {
      if (!Array.isArray(metrics) || !metrics.length) return null;
      const rows = metrics.slice(0, 4).map((metric) => {
        const id = metric.readingId || metric.representationFamily || "representation";
        const structural = distanceValueText(metric.structuralDistance);
        const analytic = distanceValueText(metric.analyticDistance);
        const faithfulness = distanceValueText(metric.biLipschitzFaithfulness);
        return `${id}: structural=${structural || "n/a"}, analytic=${analytic || "n/a"}, faithfulness=${faithfulness || "n/a"}`;
      });
      if (metrics.length > rows.length) rows.push(`more: ${metrics.length - rows.length}`);
      return rows.join("; ");
    }

    function itemHtml(item, fallbackLabel, index) {
      if (item && typeof item === "object") {
        const title = item.title || item.kind || item.conclusion || item.id || `${fallbackLabel} ${index + 1}`;
        const text = item.oneLine || item.whyItMatters || item.summary || item.description || item.reading || item.reason || item.recommendedAction || item.recommendedNextAction || JSON.stringify(item).slice(0, 240);
        const sceneId = item.viewerNavigation?.sceneId || item.sceneId;
        const sourceRefs = item.evidence?.sourceRefs || item.sourceRefs || [];
        const refs = [
          item.ref,
          item.axisRef,
          item.lawRef,
          item.nextAction?.label && `next: ${item.nextAction.label}`,
          Array.isArray(item.tourRefs) && item.tourRefs.length ? `Start tour: ${item.tourRefs[0]}` : null,
          item.evidence?.sourceRefs?.length ? `copy source refs: ${item.evidence.sourceRefs.slice(0, 3).join(", ")}` : null,
          Array.isArray(item.detailRefs) && item.detailRefs.length ? `detail: ${item.detailRefs.slice(0, 2).join(", ")}` : null
        ].filter(Boolean).join(" / ");
        const tourId = Array.isArray(item.tourRefs) && item.tourRefs.length ? item.tourRefs[0] : null;
        const actions = [
          tourId ? `<button type="button" data-tour-id="${escapeAttr(tourId)}">Start tour</button>` : "",
          sceneId ? `<button type="button" data-scene-id="${escapeAttr(sceneId)}">Open scene</button>` : "",
          Array.isArray(sourceRefs) && sourceRefs.length ? `<button type="button" data-copy-source-refs="${escapeAttr(sourceRefs.join("\\n"))}">copy source refs</button>` : ""
        ].filter(Boolean).join("");
        return `<div class="item"><strong>${escapeHtml(String(title))}</strong><p>${escapeHtml(String(text))}</p>${refs ? `<p>${escapeHtml(refs)}</p>` : ""}${actions ? `<div class="chips">${actions}</div>` : ""}</div>`;
      }
      return `<div class="item"><strong>${escapeHtml(`${fallbackLabel} ${index + 1}`)}</strong><p>${escapeHtml(String(item))}</p></div>`;
    }

    function renderCoverage(boundaries, verdict, summary) {
      const root = document.getElementById("coverage");
      const coverage = boundaries.coverageGaps || summary.coverageGapSummary || {};
      const chips = [
        verdict.flatness && `flatness: ${verdict.flatness}`,
        verdict.qualityState && `quality: ${verdict.qualityState}`,
        coverage.gapCount != null && `coverage gaps: ${coverage.gapCount}`,
        boundaries.measurementBasis?.basis && `basis: ${boundaries.measurementBasis.basis}`,
        summary.measurementBasis?.basis && `basis: ${summary.measurementBasis.basis}`
      ].filter(Boolean);
      root.innerHTML = chips.length
        ? `<div class="item"><div class="chips">${chips.map((chip) => `<span class="chip">${escapeHtml(chip)}</span>`).join("")}</div></div>`
        : emptyItem();
    }

    function renderArtifacts(artifacts, sourceRefs, manifest) {
      const root = document.getElementById("artifacts");
      const rawPaths = manifest.rawArtifactPaths || {};
      const generated = Array.isArray(manifest.generatedArtifacts) ? manifest.generatedArtifacts : [];
      const omitted = Array.isArray(manifest.omittedArtifacts) ? manifest.omittedArtifacts : [];
      const pairs = [
        ["viewer data", "archsig-atom-viewer-data.json"],
        ["summary", artifacts.summary || sourceRefs.summary],
        ["manifest", artifacts.manifest || sourceRefs.manifest],
        ["packet", rawPaths.analysisPacket],
        ["detail-index", rawPaths.analysisDetailIndex],
        ["llm interpretation", rawPaths.llmInterpretationPacket],
        ["generated", generated.length ? generated.join(", ") : null],
        ["omitted", omitted.length ? omitted.join(", ") : null],
        ["raw artifacts", artifacts.rawArtifacts || (manifest.rawArtifactRetention ? `retention: ${manifest.rawArtifactRetention}` : "see manifest")]
      ].filter(([, value]) => value);
      root.innerHTML = pairs.map(([label, value]) => {
        const text = String(value);
        const link = text.endsWith(".json") ? `<a href="${escapeAttr(text)}">${escapeHtml(text)}</a>` : escapeHtml(text);
        return `<div class="item"><strong>${escapeHtml(label)}</strong><p>${link}</p></div>`;
      }).join("");
    }

    function renderValidationStatus(validation) {
      const root = document.getElementById("validation-status");
      const rows = Object.entries(validation || {})
        .filter(([, value]) => value && typeof value === "object")
        .map(([key, value]) => {
          const result = value.result || "unknown";
          const counts = [
            value.failedCheckCount != null && `failed: ${value.failedCheckCount}`,
            value.warningCheckCount != null && `warnings: ${value.warningCheckCount}`
          ].filter(Boolean).join(", ");
          const klass = result === "fail" ? "fail" : result === "warn" ? "warn" : "ok";
          return `<div class="item"><strong>${escapeHtml(key)}</strong><p><span class="${klass}">${escapeHtml(String(result))}</span>${counts ? ` ${escapeHtml(counts)}` : ""}</p></div>`;
        });
      root.innerHTML = rows.length ? rows.join("") : emptyItem();
    }

    function renderOmitted(counts, policy, geometryCounts = {}) {
      const root = document.getElementById("omitted");
      const rows = Object.entries(counts)
        .filter(([key]) => key !== "omittedReasons" && key !== "rawPacketDetail")
        .map(([key, value]) => `${key}: ${value}`);
      const geometryRows = Object.entries(geometryCounts)
        .map(([key, value]) => `gluingGeometry.${key}: ${value}`);
      const reasons = Array.isArray(counts.omittedReasons) ? counts.omittedReasons : [];
      const policyText = [policy.atomNodes, policy.moleculeGroups, policy.overlays].filter(Boolean);
      const items = [...geometryRows, ...rows, counts.rawPacketDetail, ...reasons, ...policyText].filter(Boolean);
      root.innerHTML = items.length
        ? items.slice(0, 12).map((item) => `<div class="item"><p>${escapeHtml(String(item))}</p></div>`).join("")
        : emptyItem();
    }

    function emptyItem() {
      return `<div class="item"><p>No data loaded</p></div>`;
    }

    function compactJson(value) {
      return JSON.stringify(value).slice(0, 260);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    window.addEventListener("resize", resize);
    resize();
    animate();

    try {
      const response = await fetch("./archsig-atom-viewer-data.json");
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      renderData(await response.json(), "archsig-atom-viewer-data.json", await loadCompanionReports());
    } catch (error) {
      renderData({
        schemaVersion: "archsig-atom-viewer-data-v0",
        atomNodes: [],
        moleculeGroups: [],
        atomEdges: [],
        reportPane: {
          overview: {
            architectureId: "No viewer data loaded",
            validation: {}
          }
        },
        omittedDetailCounts: {
          rawPacketDetail: "raw packet detail is not loaded by this viewer"
        }
      }, "archsig-atom-viewer-data.json", {});
      status("Open archsig-atom-viewer-data.json");
    }
  </script>
</body>
</html>
