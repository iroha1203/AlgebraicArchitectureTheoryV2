name: 実装依頼
description: Lean / Rust tooling / website など、実装変更を主目的にする Issue
title: "[実装] "
body:
  - type: markdown
    attributes:
      value: |
        実装変更を依頼する Issue です。ドキュメント更新だけで閉じてよい Issue ではない場合、このテンプレートを使ってください。

  - type: textarea
    id: background
    attributes:
      label: 背景・課題
      description: なぜこの変更が必要か、現状の問題や前提を短く書いてください。
      placeholder: |
        例:
        - Issue #N の完了により、次の theorem を実装できる状態になった
        - archsig report に theorem precondition status が出ておらず、PR review artifact として不十分
    validations:
      required: true

  - type: dropdown
    id: primary_area
    attributes:
      label: 主対象領域
      description: この Issue の中心となる領域を 1 つ選んでください。
      options:
        - "formal: Lean 形式化"
        - "tool: Rust tooling / ArchSig"
        - "website: GitHub Pages 公開面"
        - "doc: docs / README"
    validations:
      required: true

  - type: checkboxes
    id: affected_areas
    attributes:
      label: 影響範囲
      description: 変更が必要、または確認が必要な領域をすべて選んでください。
      options:
        - label: "formal: `Formal.lean`, `Formal/**`, Lean theorem / definition / status"
        - label: "tool: `tools/archsig/**`, schema, fixture, report, CLI"
        - label: "website: `website/**`, Pages workflow, asset path"
        - label: "doc: `docs/**`, `README.md`, `README.jp.md`, theorem index / proof obligations"

  - type: dropdown
    id: expected_deliverable
    attributes:
      label: 期待する成果物
      description: この Issue を閉じるために必要な主成果物を選んでください。
      options:
        - コード実装が必須
        - Lean theorem / definition 追加が必須
        - Rust tooling 変更が必須
        - website 表示・導線変更が必須
        - docs 更新も必要だが、実装変更が主目的
    validations:
      required: true

  - type: textarea
    id: target_files
    attributes:
      label: 修正対象ファイル・候補
      description: 変更してほしいファイル、または調査してほしい候補ファイルを列挙してください。未確定の場合は「候補」として書いてください。
      placeholder: |
        - `Formal/Arch/Core/Layering.lean`
        - `docs/aat/proof_obligations.md`
        - `tools/archsig/src/...`
    validations:
      required: true

  - type: textarea
    id: additions
    attributes:
      label: 追加するもの
      description: 新しい theorem / definition / CLI option / schema field / page section / test などを列挙してください。
      placeholder: |
        - theorem `...`
        - fixture `...`
        - test case for `...`
    validations:
      required: true

  - type: textarea
    id: updates
    attributes:
      label: 更新するもの
      description: 既存の仕様、実装、文書、テストのうち更新が必要なものを書いてください。なければ「なし」。
      placeholder: |
        - `docs/aat/lean_theorem_index.md` の Lean status
        - `tools/archsig/README.md` の CLI 説明
    validations:
      required: true

  - type: textarea
    id: removals
    attributes:
      label: 削除・置換するもの
      description: 削除、移動、置換したいものを書いてください。なければ「なし」。
      placeholder: |
        - なし
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: この Issue ではやらないこと
      description: doc-only で閉じない、API 互換性を壊さない、website は触らない等、非対象を明示してください。
      placeholder: |
        - ドキュメント修正だけで完了扱いにしない
        - empirical extractor の完全性は主張しない
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: レビュー時に確認できる形で、必須条件をチェックリストにしてください。
      value: |
        - [ ] 指定した実装変更が入っている
        - [ ] 必要なテストまたは build が通っている
        - [ ] 必要な Lean status / docs / website copy が更新されている
        - [ ] 対象外の主張や過剰な claim を追加していない
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 想定する検証コマンド
      description: この Issue の PR で実行すべきコマンドを列挙してください。不要なものは削除してください。
      value: |
        - [ ] `lake build`
        - [ ] `cargo test --manifest-path tools/archsig/Cargo.toml`
        - [ ] `git diff --check`
        - [ ] hidden / bidirectional Unicode scan
        - [ ] `axiom` / `admit` / `sorry` / `unsafe` scan
    validations:
      required: true

  - type: checkboxes
    id: guardrails
    attributes:
      label: ガードレール
      description: 該当するものを確認してください。
      options:
        - label: "この Issue は docs の修正だけでは完了しない"
        - label: "`axiom`, `admit`, `sorry`, `unsafe` を明示的な相談なしに導入しない"
        - label: "Architecture Signature を単一スコアとして扱わない"
        - label: "Lean で証明済みの主張と empirical hypothesis を混同しない"
