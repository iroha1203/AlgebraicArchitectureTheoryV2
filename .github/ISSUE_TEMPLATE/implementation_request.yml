name: 実装依頼
description: Lean / Rust tooling / website など、実装変更を主目的にする Issue
title: "[実装] "
body:
  - type: markdown
    attributes:
      value: |
        実装変更を依頼する Issue です。何が問題で、何を実現し、どの条件を満たせば完了かを記載してください。

  - type: dropdown
    id: task_type
    attributes:
      label: タスク型
      description: この Issue の性質を選んでください。
      options:
        - 新規実装
        - 修正
        - 移植（Research→本体）
    validations:
      required: true

  - type: dropdown
    id: primary_area
    attributes:
      label: 主対象領域
      description: この Issue の中心となる領域を 1 つ選んでください。
      options:
        - "formal: Lean 形式化"
        - "tool: Rust tooling / ArchSig / ArchView / FieldSig"
        - "website: 公開面"
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: 現状の課題
      description: 何が不足・不整合・未実装なのか、なぜ対応が必要なのかを書いてください。確認できる宣言名、出力、Issue、資料などがあれば含めてください。
      placeholder: |
        - 現在起きていること:
        - 問題となる理由:
        - 確認できる根拠:
    validations:
      required: true

  - type: textarea
    id: solution_direction
    attributes:
      label: 解決方針
      description: 採用する設計または対応方針を書いてください。実装手段を過度に固定せず、避けてはならない本質的な要件を明記してください。
      placeholder: |
        - 採用する方針:
        - 維持すべき性質:
    validations:
      required: true

  - type: textarea
    id: expected_deliverables
    attributes:
      label: 期待する成果物
      description: この Issue で追加・変更するコード、theorem、test、schema、文書などを列挙してください。
      placeholder: |
        - Lean theorem `...`
        - `tools/...` の実装
        - regression test
        - 関連する文書・台帳の更新
    validations:
      required: true

  - type: textarea
    id: acceptance_requirements
    attributes:
      label: 受け入れ要件
      description: 完了を第三者が客観的に判定できる条件を記載してください。成果物の存在やbuildの通過だけでなく、成立すべきstatement・振る舞い・接続・整合条件と、その確認方法を具体化してください。
      placeholder: |
        - [ ] 成果物: `<具体的に追加・変更されるもの>`
        - [ ] 成立条件: `<成立すべき statement または振る舞い>`
        - [ ] 接続・整合: `<既存の実装・定理・schema・文書との関係>`
        - [ ] 失敗ケース: `<検出または拒否すべき入力・退行>`
        - [ ] 検証証拠: `<test、コマンド、宣言名、出力など>`
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: 関連 Issue、依存関係、source of truth、対象外、候補ファイル、参考資料などがあれば記載してください。
      placeholder: |
        - 関連 Issue: #N
        - source of truth: `...`
        - 対象外: ...
