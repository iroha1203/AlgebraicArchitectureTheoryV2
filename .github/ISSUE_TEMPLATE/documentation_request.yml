name: ドキュメント修正依頼
description: docs / README / website copy など、文章変更を主目的にする Issue
title: "[doc] "
body:
  - type: markdown
    attributes:
      value: |
        ドキュメント修正を主目的にする Issue です。何が問題で、何を実現し、どの条件を満たせば完了かを記載してください。
        Lean / tooling / website の実装変更が必要な場合は、実装依頼テンプレートを使ってください。

  - type: dropdown
    id: primary_area
    attributes:
      label: 主対象領域
      description: この Issue の中心となる文書領域を 1 つ選んでください。
      options:
        - "docs: 研究文書"
        - "formal status: Lean status / theorem index / proof obligations"
        - "tool docs: tooling README / commands / schema docs"
        - "website copy: 公開面"
        - "entry docs: README.md / README.jp.md"
    validations:
      required: true

  - type: textarea
    id: current_problem
    attributes:
      label: 現状の課題
      description: どの記述が古い、曖昧、またはsource of truthと不整合なのか、なぜ対応が必要なのかを書いてください。
      placeholder: |
        - 現在の記述・状態:
        - 問題となる理由:
        - 照合できる根拠:
    validations:
      required: true

  - type: textarea
    id: solution_direction
    attributes:
      label: 解決方針
      description: どのような構成・記述・参照関係へ直すかを書いてください。claimやstatusを変更する場合は根拠も示してください。
      placeholder: |
        - 採用する方針:
        - 維持すべき主張・責務:
    validations:
      required: true

  - type: textarea
    id: expected_deliverables
    attributes:
      label: 期待する成果物
      description: この Issue で追加・変更・削除する文書や索引を列挙してください。
      placeholder: |
        - `docs/...` の更新
        - theorem indexとの整合
        - 重複記述の整理
    validations:
      required: true

  - type: textarea
    id: acceptance_requirements
    attributes:
      label: 受け入れ要件
      description: 完了を第三者が客観的に判定できる条件を記載してください。ファイル更新やscanの通過だけでなく、照合先と修正後に成立すべき具体的な整合条件を含めてください。
      placeholder: |
        - [ ] 成果物: `<具体的に追加・変更・削除される文書>`
        - [ ] 成立条件: `<修正後に成立する記述・構成・参照関係>`
        - [ ] source of truthとの整合: `<照合先と一致させる内容>`
        - [ ] 退行防止: `<残してはならない古い記述・過剰なclaim・重複>`
        - [ ] 検証証拠: `<diff、参照先、scan、previewなど>`
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: 関連 Issue、依存関係、source of truth、対象外、候補ファイル、参考資料などがあれば記載してください。
      placeholder: |
        - 関連 Issue: #N
        - source of truth: `...`
        - 対象外: 実装変更
