name: Lean

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1

      - name: Build
        run: lake build

  archsig:
    name: archsig cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test ArchSig
        run: cargo test --manifest-path tools/archsig/Cargo.toml
