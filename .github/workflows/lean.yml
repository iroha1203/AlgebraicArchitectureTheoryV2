name: Lean

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1

      - name: Kernel axiom audit
        run: lake env lean Formal/AG/AxiomAudit.lean

  archsig:
    name: archsig cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test ArchSig
        run: cargo test --manifest-path tools/archsig/Cargo.toml

  fieldsig:
    name: fieldsig cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test FieldSig
        run: cargo test --manifest-path tools/fieldsig/Cargo.toml

  archsig-analyze-e2e:
    name: ArchSig analyze / FieldSig handoff e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ArchSig analyze to FieldSig handoff
        shell: bash
        run: |
          set -euo pipefail

          out_dir=".tmp/archsig-analyze-e2e"
          archsig_dir="$out_dir/archsig"
          archsig_raw_dir="$out_dir/archsig-raw"
          archsig_measurement_dir="$out_dir/archsig-measurement"
          fieldsig_dir="$out_dir/fieldsig"
          mkdir -p "$archsig_dir" "$archsig_raw_dir" "$archsig_measurement_dir" "$fieldsig_dir"

          cargo run --manifest-path tools/archsig/Cargo.toml -- analyze \
            --archmap tools/archsig/tests/fixtures/archmap_v1/archmap.json \
            --law-policy tools/archsig/tests/fixtures/archmap_v1/law_policy.json \
            --out-dir "$archsig_dir"

          test -s "$archsig_dir/archmap-validation.json"
          test -s "$archsig_dir/law-policy-validation.json"
          test -s "$archsig_dir/archsig-analysis-validation.json"
          test -s "$archsig_dir/archsig-analysis-summary.json"
          test -s "$archsig_dir/archsig-atom-viewer-data.json"
          test -s "$archsig_dir/archsig-run-manifest.json"
          test -s "$archsig_dir/normalized-archmap.json"
          test -s "$archsig_dir/typed-evaluator-results.json"
          test ! -e "$archsig_dir/archsig-analysis-packet.json"
          test ! -e "$archsig_dir/archsig-analysis-detail-index.json"
          test ! -e "$archsig_dir/llm-interpretation-packet.json"

          jq -e '
            .schema == "archsig-run-manifest/v0.5.0"
            and .mode == "measurement"
            and .rawArtifactRetention == "omitted"
            and .artifactLinks.typedEvaluatorResults == "typed-evaluator-results.json"
            and ([.generatedArtifacts[]] | index("archsig-analysis-summary.json") != null)
            and ([.generatedArtifacts[]] | index("archsig-atom-viewer-data.json") != null)
            and ([.generatedArtifacts[]] | index("typed-evaluator-results.json") != null)
            and ([.omittedArtifacts[]] | index("archsig-analysis-packet.json") != null)
          ' "$archsig_dir/archsig-run-manifest.json"

          jq -e '
            .schema == "archsig-atom-viewer-data/v0.5.0"
            and .dataKind == "typed-evaluator-viewer-projection"
            and ((.atomNodes | length) > 0)
            and (.reportPane.overview.summaryVerdict | type == "string")
            and .reportPane.artifacts.summary == "archsig-analysis-summary.json"
            and .reportPane.artifacts.typedEvaluatorResults == "typed-evaluator-results.json"
            and (.reportPane.actionQueue | type == "array")
            and (.reportPane.coverageAndBoundaries == null or (.reportPane.coverageAndBoundaries | type == "object"))
          ' "$archsig_dir/archsig-atom-viewer-data.json"

          cargo run --manifest-path tools/archsig/Cargo.toml -- analyze \
            --archmap tools/archsig/tests/fixtures/archmap_v1/archmap.json \
            --law-policy tools/archsig/tests/fixtures/archmap_v1/law_policy.json \
            --out-dir "$archsig_raw_dir" \
            --emit-raw-artifacts

          test -s "$archsig_raw_dir/archmap-validation.json"
          test -s "$archsig_raw_dir/law-policy-validation.json"
          test -s "$archsig_raw_dir/archsig-analysis-validation.json"
          test -s "$archsig_raw_dir/archsig-analysis-summary.json"
          test -s "$archsig_raw_dir/archsig-atom-viewer-data.json"
          test -s "$archsig_raw_dir/archsig-run-manifest.json"
          test -s "$archsig_raw_dir/normalized-archmap.json"
          test -s "$archsig_raw_dir/typed-evaluator-results.json"
          test -s "$archsig_raw_dir/archsig-analysis-packet.json"
          test -s "$archsig_raw_dir/archsig-analysis-detail-index.json"
          test -s "$archsig_raw_dir/llm-interpretation-packet.json"

          jq -e '
            .schema == "archsig-run-manifest/v0.5.0"
            and .mode == "measurement"
            and .rawArtifactRetention == "full"
            and ([.generatedArtifacts[]] | index("archsig-analysis-packet.json") != null)
            and .rawArtifactPaths.analysisPacket == "archsig-analysis-packet.json"
            and .rawArtifactPaths.analysisDetailIndex == "archsig-analysis-detail-index.json"
            and .rawArtifactPaths.llmInterpretationPacket == "llm-interpretation-packet.json"
            and (.omittedArtifacts | length) == 0
          ' "$archsig_raw_dir/archsig-run-manifest.json"

          jq -e '
            .schema == "archsig-analysis-packet/v0.5.0"
            and .inputRefs.lawPolicy == "input:law_policy.json"
            and .inputRefs.normalizedArchMap == "normalized-archmap.json"
            and .inputRefs.typedEvaluatorResults == "typed-evaluator-results.json"
            and ((.typedEvaluatorResults | length) > 0)
            and ((.positiveBoundedConclusions | length) > 0)
            and ([.nonConclusions[] | contains("not a Lean proof object")] | any)
          ' "$archsig_raw_dir/archsig-analysis-packet.json"

          jq -e '
            .schema == "archsig-analysis-detail-index/v0.5.0"
            and .indexKind == "typed-evaluator-support-index"
            and (.entries | type == "array")
            and ((.entries | length) > 0)
            and (.refDictionary | type == "array")
          ' "$archsig_raw_dir/archsig-analysis-detail-index.json"

          jq -e --slurpfile packet "$archsig_raw_dir/archsig-analysis-packet.json" '
            .schema == "llm-interpretation-packet/v0.5.0"
            and .interpretationKind == "typed-evaluator-bounded-reading"
            and .typedEvaluatorSummary.resultCount == ($packet[0].typedEvaluatorResults | length)
          ' "$archsig_raw_dir/llm-interpretation-packet.json"

          jq -e '
            .summary.result == "pass"
            and .schema == "archsig-analysis-validation-report/v0.5.0"
            and ([.checks[]? | select(.result == "pass") | .checkId] | index("archsig.v1.typedEvaluatorResultCount") != null)
          ' "$archsig_raw_dir/archsig-analysis-validation.json"

          cargo run --manifest-path tools/fieldsig/Cargo.toml -- archsig-analysis-sft-input \
            --analysis-packet "$archsig_raw_dir/archsig-analysis-packet.json" \
            --out "$fieldsig_dir/operation-support-estimate.json"

          jq -e '
            .schema == "operation-support-estimate/v0.5.0"
            and .descriptorRef.artifactKind == "archsig-analysis-packet"
            and ([.candidateOperationFamilies[]?.supportKind] | index("typed-evaluator-result") != null)
            and ([.descriptorRef.sourceRefIds[]? | startswith("archsigV1PacketRef:architectureSpectrumReport:")] | any)
            and ([.descriptorRef.sourceRefIds[]? | startswith("archsigV1PacketRef:architectureHomotopyReport:")] | any)
            and ([.descriptorRef.sourceRefIds[]? | startswith("archsigV1StructuralReadingReviewSurface:")] | any)
            and ([.evidenceBoundary.measurementBoundaryRefs[]? | startswith("archsigV1SpectrumBoundary:")] | any)
            and ([.evidenceBoundary.measurementBoundaryRefs[]? | startswith("archsigV1HomotopyBoundary:")] | any)
            and ([.evidenceBoundary.measurementBoundaryRefs[]? | startswith("archsigV1StructuralBoundary:")] | any)
            and ([.knownForbiddenSupport[]?.operationFamily] | index("raw-archmap-truth-promotion") != null)
            and (.unknownRemainder | type == "array")
          ' "$fieldsig_dir/operation-support-estimate.json"

          cargo run --manifest-path tools/fieldsig/Cargo.toml -- schema-compatibility \
            --before "$archsig_raw_dir/archsig-analysis-packet.json" \
            --after "$archsig_raw_dir/archsig-analysis-packet.json" \
            --out "$fieldsig_dir/schema-compatibility-report.json"

          jq -e '
            .schema == "schema-compatibility-check-report/v0.5.0"
            and .summary.result == "pass"
            and .after.artifactId == "archsig-analysis-packet/v0.5.0"
            and .after.schemaName == "archsig-analysis-packet/v0.5.0"
          ' "$fieldsig_dir/schema-compatibility-report.json"

          if cargo run --manifest-path tools/fieldsig/Cargo.toml -- archsig-analysis-sft-input \
            --analysis-packet tools/archsig/tests/fixtures/archmap_v1/archmap.json \
            --out "$fieldsig_dir/raw-archmap-rejected.json"; then
            echo "FieldSig accepted raw ArchMap as ArchSig analysis packet" >&2
            exit 1
          fi

          cargo run --manifest-path tools/archsig/Cargo.toml -- analyze \
            --archmap tools/archsig/tests/fixtures/ag_measurement/archmap_v2_support_transfer.json \
            --law-policy tools/archsig/tests/fixtures/ag_measurement/law_policy_transfer.json \
            --out-dir "$archsig_measurement_dir"

          test -s "$archsig_measurement_dir/archsig-measurement-packet.json"

          cargo run --manifest-path tools/archsig/Cargo.toml -- analyze \
            --archmap tools/archsig/tests/fixtures/ag_measurement/archmap_v2.json \
            --law-policy tools/archsig/tests/fixtures/ag_measurement/law_policy_ag.json \
            --out-dir "$archsig_measurement_dir/gate-smoke"

          cargo run --manifest-path tools/archsig/Cargo.toml -- gate \
            --packet "$archsig_measurement_dir/gate-smoke/archsig-measurement-packet.json" \
            --policy tools/archsig/tests/fixtures/ag_measurement/gate_policy_conservative.json \
            --out "$archsig_measurement_dir/archsig-gate-report.json"

          jq -e '
            .schema == "archsig-gate-report/v0.5.0"
            and .decision == "PASS_WITHIN_GATE_POLICY"
            and ([.ruleOutcomes[]? | select(.scope == "absolute" and .status == "evaluated")] | length == 1)
          ' "$archsig_measurement_dir/archsig-gate-report.json"

          jq -e '
            .schema == "archsig-measurement-packet/v0.5.0"
            and .packetId == "measurement:ag-measurement-support-transfer-fixture"
            and (.profile.profileId == "profile:ag-support-transfer@1")
            and ((.computedInvariants | length) > 0)
            and ((.analyticReadings | length) > 0)
            and ([.assumptions[]? | select(.assumption == "transfer_lower_bound" and .status == "assumed")] | length == 1)
          ' "$archsig_measurement_dir/archsig-measurement-packet.json"

          cargo run --manifest-path tools/fieldsig/Cargo.toml -- archsig-analysis-sft-input \
            --measurement-packet "$archsig_measurement_dir/archsig-measurement-packet.json" \
            --out "$fieldsig_dir/operation-support-estimate-measurement.json"

          jq -e '
            .schema == "operation-support-estimate/v0.5.0"
            and .descriptorRef.artifactKind == "archsig-measurement-packet"
            and ([.candidateOperationFamilies[]?.supportKind] | index("measurement-packet-analytic-reading") != null)
            and ([.descriptorRef.sourceRefIds[]? | startswith("archsigMeasurementPacket:")] | any)
            and ([.evidenceBoundary.measurementBoundaryRefs[]? | startswith("archsigMeasurementAnalytic:")] | any)
            and ([.knownForbiddenSupport[]?.operationFamily] | index("raw-archmap-truth-promotion") != null)
            and ([.unknownRemainder[]?.reason | contains("transfer_lower_bound")] | any)
          ' "$fieldsig_dir/operation-support-estimate-measurement.json"

      - name: Upload ArchSig analyze e2e artifacts
        uses: actions/upload-artifact@v4
        with:
          name: archsig-analyze-e2e-${{ github.run_id }}
          path: .tmp/archsig-analyze-e2e
