name: Lean

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  research-integrity-gates:
    name: research integrity gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Research package validation
        id: research-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: .github/lean_quality/select_research_package_validation.sh

      - name: Current-tree import graph
        run: .github/lean_quality/check_research_import_direction.sh

      - name: Legacy reference no-new gate
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: .github/lean_quality/check_research_legacy_refs.sh no-new "$BASE_SHA" "$HEAD_SHA"

      - name: Legacy reference no-new gate (main push)
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if printf '%s' "$BASE_SHA" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi
          .github/lean_quality/check_research_legacy_refs.sh no-new "$BASE_SHA" "$HEAD_SHA"

      - name: Research separation fixture suite
        run: .github/lean_quality/test_research_separation_gates.sh

      - name: Research package direction (static)
        run: .github/lean_quality/test_research_package_direction.sh

      - name: Research validation selection test
        run: .github/lean_quality/test_research_package_validation.sh

      - name: Set up Lean for Research package validation
        if: steps.research-changes.outputs.run == 'true'
        uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
          lint: false
          use-github-cache: false

      - name: Package dependency direction (runtime)
        if: steps.research-changes.outputs.run == 'true'
        run: .github/lean_quality/check_research_package_direction.sh --execute

      - name: Research migration fixture suite
        run: .github/lean_quality/test_research_migration_manifest.sh

      - name: Committed R3 migration artifact integrity
        run: |
          manifest_rows="$(awk -F '\t' '!/^#/ && NF { count++ } END { print count + 0 }' research/lean/migrations/R3/manifest.tsv)"
          test "$manifest_rows" -eq 39
          jq -e '.schema == "aat-research-migration/v1" and .batch == "R3" and .moduleCount == 39 and .declarationCount == 1549' \
            research/lean/migrations/R3/metadata.json >/dev/null
          declaration_rows="$(jq -s 'length' research/lean/migrations/R3/declarations.jsonl)"
          unique_records="$(jq -s 'map(.migration_record) | unique | length' research/lean/migrations/R3/declarations.jsonl)"
          test "$declaration_rows" -eq 1549
          test "$unique_records" -eq "$declaration_rows"
          legacy_namespace='Formal.AG.Resear''ch'
          legacy_path='Formal/AG/'"Research"
          ! rg -n "$legacy_namespace|$legacy_path|ResearchLean.AG" \
            research/lean/migrations/R3/declarations.jsonl

      - name: Changed public artifacts
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: .github/lean_quality/check_changed_public_artifacts.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Changed public artifacts (main push)
        if: github.event_name == 'push'
        env:
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if printf '%s' "$BASE_SHA" | grep -Eq '^0+$'; then
            BASE_SHA="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi
          .github/lean_quality/check_changed_public_artifacts.sh "$BASE_SHA" "$HEAD_SHA"

      - name: Changed public artifact fixtures
        run: .github/lean_quality/test_changed_public_artifacts.sh

  build:
    name: lake build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select active AAT algebraic geometry build
        id: ag-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BASE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          base="$PUSH_BASE"
          if [ "$EVENT_NAME" = "pull_request" ]; then base="$PR_BASE"; fi
          if printf '%s' "$base" | grep -Eq '^0+$'; then
            base="$(git rev-list --max-parents=0 "$HEAD_SHA" | tail -n 1)"
          fi
          if git diff --name-only "$base...$HEAD_SHA" | grep -Eq \
              '^(Formal/AG/|Formal/AG\.lean$|Formal/Util/AssertStandardAxioms[^/]*\.lean$|lakefile\.toml$|lake-manifest\.json$|lean-toolchain$|\.github/lean_quality/|\.github/workflows/lean\.yml$)'; then
            echo "run=true" >>"$GITHUB_OUTPUT"
          else
            echo "no Lean-relevant changes; Lean build steps are skipped"
            echo "run=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Set up Lean
        if: steps.ag-changes.outputs.run == 'true'
        uses: leanprover/lean-action@v1
        with:
          build: false
          test: false
          lint: false

      - name: Build active AAT algebraic geometry
        if: steps.ag-changes.outputs.run == 'true'
        run: lake build +Formal.AG

      - name: Kernel axiom audit
        if: steps.ag-changes.outputs.run == 'true'
        run: |
          lake env lean Formal/Util/AssertStandardAxiomsTest.lean
          lake env lean Formal/AG/AxiomAudit.lean
          test "$(grep -v '^[[:space:]]*$' Formal/AG/AxiomAudit.lean | tail -n 1)" = '#assert_standard_axioms_only AAT.AG.AxiomAudit'

      - name: Premise diff report
        if: steps.ag-changes.outputs.run == 'true'
        run: .github/lean_quality/list_premise_diff.sh
