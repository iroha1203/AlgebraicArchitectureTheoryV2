name: Lean

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: lake build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lean
        uses: leanprover/lean-action@v1

      - name: Build
        run: lake build

  sig0-extractor:
    name: sig0-extractor cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test sig0 extractor
        run: cargo test --manifest-path tools/sig0-extractor/Cargo.toml
